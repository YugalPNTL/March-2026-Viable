<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Dashboard</title>
  <meta name="description" content="Hotel revenue and expense dashboard">
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f7f6;
      margin: 0; padding: 0 15px 15px 15px; color: #333;
    }

    .container {
      max-width: 1100px; margin: 0 auto; background: white;
      padding: 0 20px 20px 20px; border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1); position: relative;
    }

    /* --- TABS --- */
    .tabs {
      display: flex; border-bottom: 2px solid #ddd;
      margin-bottom: 20px; overflow-x: auto; gap: 5px;
      padding-bottom: 2px; position: sticky; top: 0;
      background: white; z-index: 200;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-left: -20px; margin-right: -20px;
      padding-left: 20px; padding-right: 20px;
    }

    .tab-btn {
      padding: 12px 20px; cursor: pointer; border: none;
      background: none; font-weight: bold; font-size: 1.05em;
      color: #7f8c8d; transition: 0.3s; white-space: nowrap;
      border-radius: 5px 5px 0 0;
    }
    .tab-btn:hover { color: #2c3e50; background: #f8f9fa; }
    .tab-btn.active {
      color: #3498db; border-bottom: 3px solid #3498db;
      background: #ebf5fb; margin-bottom: -2px;
    }

    /* --- ALERT --- */
    #alertBar {
      display: none; background: #e74c3c; color: white;
      padding: 15px; border-radius: 8px; text-align: center;
      font-weight: bold; margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      opacity: 0; transition: opacity 0.4s ease-in-out;
      position: relative; z-index: 1000;
    }

    /* --- LOADER --- */
    #loader {
      display: none; text-align: center; color: #34495e;
      font-weight: bold; margin: 20px 0;
      font-size: 1.1em; font-style: italic;
    }
    .css-spinner {
      display: inline-block; width: 22px; height: 22px;
      border: 3px solid #ccc; border-top: 3px solid #3498db;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }

    /* --- DASHBOARD --- */
    .dashboard {
      display: none; background: #ebf5fb; padding: 20px;
      border-radius: 8px; margin-bottom: 20px;
      border-left: 6px solid #3498db;
    }
    .dashboard h3 { margin-top: 0; color: #2c3e50; }
    .dash-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px;
    }
    .dash-card {
      background: #fff; padding: 15px; border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    /* --- CONTROLS --- */
    .controls {
      display: flex; flex-wrap: wrap; gap: 15px;
      background: #f8f9fa; padding: 15px; border-radius: 8px;
      align-items: flex-start; margin-bottom: 20px;
    }
    .controls > div { display: flex; flex-direction: column; min-width: 160px; }
    .controls label { font-weight: bold; margin-bottom: 5px; font-size: 0.9em; color: #2c3e50; }

    input[type="date"], select {
      padding: 8px; border: 1px solid #ccc; border-radius: 5px;
      font-family: inherit; font-size: 1em; background: white;
    }

    button.fetch-btn {
      background: #27ae60; color: white; border: none;
      padding: 10px 20px; border-radius: 5px; cursor: pointer;
      font-weight: bold; transition: 0.3s; font-size: 1em;
      align-self: flex-start;
    }
    button.fetch-btn:hover { background: #219150; transform: translateY(-1px); }
    button.fetch-btn:disabled {
      background: #c0392b; cursor: not-allowed; opacity: 0.9; transform: none;
    }

    /* --- TABLE --- */
    .table-res {
      margin-top: 15px; border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05); width: 100%;
    }
    .table-res table {
      width: 100%; border-collapse: collapse;
      background: white; min-width: 600px;
    }
    .table-res th, .table-res td { border: 1px solid #eee; padding: 12px; text-align: left; }
    .table-res th {
      background: #34495e; color: white;
      position: sticky; top: 48px; z-index: 10;
    }
    tr:nth-child(even) { background-color: #fcfcfc; }

    /* --- CARDS --- */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .card {
      background: white; border: 1px solid #e0e0e0;
      border-radius: 10px; padding: 18px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02); transition: 0.3s;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.08); }
    .empty-state { color: #95a5a6; font-style: italic; padding: 8px 0; }
    .total-line { font-weight: bold; font-size: 1.1em; padding-top: 8px; }



    /* --- FILTER CHIPS --- */
    .filter-chips {
      display: flex; flex-wrap: wrap; gap: 10px;
      margin: 15px 0 5px 0; justify-content: center;
    }
    #recordCount {
      text-align: center; font-weight: bold; color: #2c3e50;
      font-size: 1em; margin: 8px 0 10px 0; min-height: 1.4em;
    }
    .filter-chip {
      padding: 8px 18px; border-radius: 20px;
      border: 2px solid #27ae60; background: white;
      color: #27ae60; font-weight: bold; font-size: 0.9em;
      cursor: pointer; transition: 0.2s;
    }
    .filter-chip:hover { background: #27ae60; color: white; }
    .filter-chip.active { background: #1a7a44; border-color: #1a7a44; color: white; }
    .filter-chip:disabled {
      opacity: 0.35; cursor: not-allowed; border-color: #bdc3c7; color: #bdc3c7;
    }
    .filter-chip:disabled:hover { background: white; color: #bdc3c7; }

    /* --- PAGINATION --- */
    .pagination {
      display: none; justify-content: center; align-items: center;
      gap: 15px; margin-top: 30px; flex-wrap: wrap;
      padding: 20px; background: #f8f9fa; border-radius: 8px;
    }
    .p-btn {
      padding: 10px 18px; background: #34495e; color: white;
      border: none; border-radius: 5px; cursor: pointer; font-weight: bold;
    }
    .p-btn:disabled { background: #bdc3c7; cursor: not-allowed; }

    /* --- ANALYTICS --- */
    .chart-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px; margin-top: 20px;
    }
    .chart-box {
      background: #fff; border: 1px solid #e0e0e0; padding: 15px;
      border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      width: 100%; overflow: hidden;
    }
    .perc-table {
      width: 100% !important; min-width: auto !important;
      margin-top: 15px; font-size: 0.85em;
      border-collapse: collapse; table-layout: fixed;
    }
    .perc-table th {
      background: #f8f9fa; color: #2c3e50;
      padding: 10px 5px; border-bottom: 2px solid #ddd; text-align: left;
    }
    .perc-table td {
      padding: 10px 5px; border-bottom: 1px solid #eee;
      text-align: left; word-wrap: break-word;
    }
    .perc-table th:nth-child(1), .perc-table td:nth-child(1) { width: 45%; }
    .perc-table th:nth-child(2), .perc-table td:nth-child(2) { width: 35%; white-space: nowrap; }
    .perc-table th:nth-child(3), .perc-table td:nth-child(3) { width: 20%; }

    /* --- REMARKS BUTTON BAR --- */
    .remarks-bar {
      display: none; align-items: center; gap: 12px;
      background: linear-gradient(135deg, #f5f0ff 0%, #ede7fb 100%);
      padding: 10px 18px; border-radius: 8px; margin-bottom: 15px;
      border-left: 5px solid #8e44ad;
    }
    .remarks-bar span { color: #6c3483; font-size: 0.9em; font-weight: 600; }
    .remarks-btn {
      background: linear-gradient(135deg, #8e44ad, #6c3483); color: white;
      border: none; padding: 9px 20px; border-radius: 6px; cursor: pointer;
      font-weight: bold; font-size: 0.95em; transition: 0.3s;
      box-shadow: 0 2px 6px rgba(142,68,173,0.3);
    }
    .remarks-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(142,68,173,0.4); }
    .remarks-btn:disabled { opacity: 0.7; cursor: wait; transform: none; }

    /* --- MODAL --- */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 9999;
      justify-content: center; align-items: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: white; border-radius: 12px; width: 100%; max-width: 700px;
      max-height: 85vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.25);
      animation: modalIn 0.25s ease-out;
    }
    @keyframes modalIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; border-bottom: 1px solid #eee;
      background: linear-gradient(135deg, #8e44ad, #6c3483); color: white;
      border-radius: 12px 12px 0 0; position: sticky; top: 0; z-index: 1;
    }
    .modal-header h3 { margin: 0; font-size: 1.15em; }
    .modal-close {
      background: rgba(255,255,255,0.2); border: none; color: white;
      font-size: 1.4em; width: 34px; height: 34px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: 0.2s;
    }
    .modal-close:hover { background: rgba(255,255,255,0.35); }
    .modal-body { padding: 15px 20px; }
    .modal-body table { width: 100%; border-collapse: collapse; font-size: 0.92em; }
    .modal-body th {
      background: #f8f4ff; color: #6c3483; padding: 10px 8px;
      border-bottom: 2px solid #d5c4e0; text-align: left;
    }
    .modal-body td { padding: 10px 8px; border-bottom: 1px solid #f0e8f6; vertical-align: top; }
    .modal-body tr:hover { background: #faf7ff; }
    .modal-empty { text-align: center; color: #999; padding: 30px; font-style: italic; }

    /* --- RESPONSIVE --- */
    @media (max-width: 600px) {
      .controls { flex-direction: column; align-items: stretch; }
      .controls > div { min-width: 100%; }
      button.fetch-btn { margin-top: 10px; width: 100%; }
      .tabs { gap: 2px; justify-content: space-between; }
      .tab-btn { padding: 10px 4px; font-size: 0.82em; }
      .chart-container { grid-template-columns: 1fr; }
      .card-grid { grid-template-columns: 1fr; }
      .perc-table { font-size: 0.8em; }
      .remarks-bar { flex-direction: column; text-align: center; }
      .modal-box { max-width: 100%; margin: 10px; }
      .modal-body table { font-size: 0.82em; }
    }

    .google-visualization-tooltip { pointer-events: none; }
  </style>
</head>
<body>

<div class="container">

  <h2 style="text-align:center; color:#2c3e50; margin:0 0 5px 0;">Revenue, Expense, Analytics</h2>
  <div id="headerSubtitle" style="text-align:center; font-weight:bold; color:#7f8c8d; margin-bottom:20px; font-size:1.1em;">
    🏨 Viable Inn | 📅 ...
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('revenue',this)">🛏️ Revenue</button>
    <button class="tab-btn" onclick="switchTab('expenses',this)">💸 Expenses</button>
    <button class="tab-btn" onclick="switchTab('search',this)">🔍 Payment</button>
    <button class="tab-btn" style="color:#d35400;" onclick="switchTab('analytics',this)">📊 Analytics</button>
  </div>

  <div id="alertBar"></div>

  <div class="controls">
    <div id="dateStartBox">
      <label>From Date:</label>
      <input type="date" id="startDate" onclick="this.showPicker&&this.showPicker()">
      <div style="font-size:0.82em;margin-top:3px;min-height:1.2em;"></div>
    </div>
    <div id="dateEndBox">
      <label>To Date:</label>
      <input type="date" id="endDate" onclick="this.showPicker&&this.showPicker()">
      <div style="font-size:0.82em;margin-top:3px;min-height:1.2em;"></div>
    </div>
    <div id="categoryContainer" style="display:none;min-width:160px;max-width:190px;">
      <label>Expense Category:</label>
      <select id="expCategory" style="width:100%;">
        <option value="All">All Categories</option>
      </select>
      <div id="catHint" style="font-size:0.82em;margin-top:3px;font-weight:bold;min-height:1.2em;line-height:1.2;"></div>
    </div>
    <div id="methodContainer" style="display:none;min-width:160px;max-width:190px;">
      <label>Payment Method:</label>
      <select id="payMethod" style="width:100%;">
        <option value="">-- Select Method --</option>
        <option value="All">All Payments</option>
      </select>
      <div id="searchHint" style="font-size:0.82em;margin-top:3px;font-weight:bold;min-height:1.2em;line-height:1.2;"></div>
    </div>
    <div id="transTypeContainer" style="display:none;min-width:160px;">
      <label>Transaction Type:</label>
      <select id="transType" style="width:100%;" onchange="updateTransHint()">
        <option value="All">All</option>
        <option value="Revenue">Revenue</option>
        <option value="Expense">Expense</option>
      </select>
      <div id="transHint" style="font-size:0.82em;margin-top:3px;font-weight:bold;min-height:1.2em;line-height:1.2;"></div>
    </div>
    <div>
      <label style="visibility:hidden;">Fetch</label>
      <button id="fetchBtn" class="fetch-btn" onclick="fetchData()">Fetch Data</button>
      <div style="font-size:0.82em;margin-top:3px;min-height:1.2em;"></div>
    </div>
  </div>

  <div class="remarks-bar" id="remarksBar" style="display:flex;">
    <button class="remarks-btn" id="remarksBtn" onclick="getRemarks()">📝 Get Remarks</button>
    <span>Get Remarks for Whole Month</span>
  </div>

  <div id="loader"><span class="css-spinner"></span> Fetching data, please wait...</div>
  <div id="dashboard" class="dashboard"></div>

  <div class="pagination" id="pagin">
    <button class="p-btn" id="prevB" onclick="changePage(-1)">Previous</button>
    <span id="pageTxt" style="font-weight:bold;color:#2c3e50;"></span>
    <button class="p-btn" id="nextB" onclick="changePage(1)">Next</button>
    <select id="pageSize" onchange="changePageSize()">
      <option value="10">10 / page</option>
      <option value="20">20 / page</option>
      <option value="50">50 / page</option>
      <option value="all">View All</option>
    </select>
  </div>

  <div id="content"></div>

</div>

<!-- Remarks Modal -->
<div class="modal-overlay" id="remarksModal" onclick="if(event.target===this)closeRemarks()">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="remarksModalTitle">📝 Remarks</h3>
      <button class="modal-close" onclick="closeRemarks()">&times;</button>
    </div>
    <div class="modal-body" id="remarksModalBody"></div>
  </div>
</div>

<script>
// ============================================================
//  PASTE YOUR DEPLOYED APPS SCRIPT URL HERE
// ============================================================
const API_URL = "https://script.google.com/macros/s/AKfycbwzvP6RGbBYv1CE98_gqNKrOj-x4IvCSEwkEdjbjqCl0zeVQU4NTYROoZdIUyAnUkUhow/exec";

// ============================================================
//  STATE
// ============================================================
let allData          = null;
let allDataTimestamp = null;              // when allData was last fetched
const DATA_MAX_AGE_MS = 60 * 60 * 1000;  // 1 hour in milliseconds
let currentTab       = 'revenue';
let globalData       = [];
let curPage          = 1;
let perPage          = 10;
let activeGuestFilter= 'all';
let chartsReady      = false;
let isFetching       = false;
let pendingCallbacks = [];    // queued actions waiting for in-flight API response
let tabCache         = { revenue: null, expenses: null, search: null, analytics: null };
// Per-tab independent date memory
let tabDates         = {
  revenue:  { start: '2026-04-01', end: '2026-04-30' },
  expenses: { start: '2026-04-01', end: '2026-04-30' },
  search:   { start: '2026-04-01', end: '2026-04-30' },
};

function isDataStale() {
  if (!allData || !allDataTimestamp) return true;
  return (Date.now() - allDataTimestamp) > DATA_MAX_AGE_MS;
}

function clearDataCache() {
  allData          = null;
  allDataTimestamp = null;
  tabCache         = { revenue: null, expenses: null, search: null, analytics: null };
  pendingCallbacks = [];
}

// Lock/unlock both Fetch and Remarks buttons together (same-tab mutual lock)
function lockButtons() {
  document.getElementById('fetchBtn').disabled    = true;
  document.getElementById('fetchBtn').textContent = 'Fetching...';
  document.getElementById('remarksBtn').disabled  = true;
  document.getElementById('remarksBtn').textContent = 'Loading...';
}
function unlockButtons() {
  document.getElementById('fetchBtn').disabled    = false;
  document.getElementById('fetchBtn').textContent = 'Fetch Data';
  document.getElementById('remarksBtn').disabled  = false;
  document.getElementById('remarksBtn').textContent = '\ud83d\udcdd Get Remarks';
}

// Fetch with 30-second timeout
const FETCH_TIMEOUT_MS = 30000;
function fetchWithTimeout(url) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);
  return fetch(url, { signal: controller.signal })
    .then(r => { clearTimeout(timer); return r; })
    .catch(err => {
      clearTimeout(timer);
      if (err.name === 'AbortError') throw new Error('Request timed out. Please check your connection and try again.');
      throw err;
    });
}

// ============================================================
//  INIT
// ============================================================
google.charts.load('current', { packages: ['corechart'] });
google.charts.setOnLoadCallback(() => { chartsReady = true; });

(function init() {
  // Hardcoded to April 2026 — dates outside this month are blocked
  const first = '2026-04-01';
  const lastS = '2026-04-30';

  ['startDate', 'endDate'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.value = i === 0 ? first : lastS;
    el.min   = first;
    el.max   = lastS;
  });

  document.getElementById('headerSubtitle').innerHTML = '🏨 Viable Inn | 📅 April 2026';
  document.title = 'Viable Inn — April 2026';

  document.getElementById('payMethod').addEventListener('change', function() {
    const h = document.getElementById('searchHint');
    if (!this.value)            h.innerText = '';
    else if (this.value === 'All') h.innerHTML = "📊 Showing <b>All Payment Methods</b>";
    else h.innerHTML = `🎯 <span style='color:#27ae60;'>Only <b>${this.value}</b> Payments</span>`;
  });

  document.getElementById('expCategory').addEventListener('change', function() {
    const h = document.getElementById('catHint');
    if (this.value === 'All') h.innerHTML = `📂 <span style='color:#2980b9;'>Showing <b>All Categories</b></span>`;
    else h.innerHTML = `🎯 <span style='color:#d35400;'>Showing <b>${this.value}</b> only</span>`;
  });

  // Silent pre-load of dropdown values on page open (no loader shown)
  fetchWithTimeout(API_URL + '?action=getDropdown')
    .then(r => r.json())
    .then(data => { if (!data.error) populateDropdowns(data); })
    .catch(() => { /* silent fail — dropdowns stay with default static options */ });
})();

window.addEventListener('resize', () => {
  if (currentTab === 'analytics' && tabCache.analytics && chartsReady) drawAnalyticsCharts(tabCache.analytics);
  else if (globalData.length > 0) renderUI();
});

// When tab regains focus (e.g. user switches back on mobile),
// silently expire stale data so the next Fetch click goes to the server.
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && isDataStale()) {
    clearDataCache();
    // Clear rendered content on all tabs so user knows data is stale
    globalData = [];
    document.getElementById('content').innerHTML   = '';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('pagin').style.display     = 'none';
  }
});

// ============================================================
//  TAB SWITCHING
// ============================================================
function switchTab(tab, btn) {
  // Save current date values to the tab we're leaving (not analytics — it has no pickers)
  if (currentTab !== 'analytics') {
    tabDates[currentTab] = {
      start: document.getElementById('startDate').value,
      end:   document.getElementById('endDate').value
    };
  }

  currentTab = tab; activeGuestFilter = 'all';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  hideAlert();

  const isAnalytics = tab === 'analytics';
  document.getElementById('dateStartBox').style.display    = isAnalytics ? 'none' : 'flex';
  document.getElementById('dateEndBox').style.display      = isAnalytics ? 'none' : 'flex';
  document.getElementById('categoryContainer').style.display = tab === 'expenses' ? 'flex' : 'none';
  document.getElementById('methodContainer').style.display   = tab === 'search'   ? 'flex' : 'none';
  document.getElementById('transTypeContainer').style.display= tab === 'search'   ? 'flex' : 'none';
  document.getElementById('remarksBar').style.display = (tab === 'revenue' || tab === 'expenses') ? 'flex' : 'none';

  // Load this tab's own saved dates into the inputs
  if (!isAnalytics) {
    document.getElementById('startDate').value = tabDates[tab].start;
    document.getElementById('endDate').value   = tabDates[tab].end;
  }

  // If a fetch is in progress, re-enable Fetch on the new tab (Rule 2)
  // so the user can click it — but clicking won't send a new API call
  if (isFetching) {
    document.getElementById('fetchBtn').disabled    = false;
    document.getElementById('fetchBtn').textContent = 'Fetch Data';
    document.getElementById('remarksBtn').disabled  = false;
    document.getElementById('remarksBtn').textContent = '\ud83d\udcdd Get Remarks';
    return;
  }

  document.getElementById('fetchBtn').disabled    = false;
  document.getElementById('fetchBtn').textContent = 'Fetch Data';
  document.getElementById('remarksBtn').disabled  = false;
  document.getElementById('remarksBtn').textContent = '\ud83d\udcdd Get Remarks';

  if (tabCache[tab]) {
    // This tab has been explicitly fetched before — restore its cached data
    restoreFromCache(tab);
  } else {
    // Tab has never been fetched — show nothing until user clicks Fetch
    document.getElementById('content').innerHTML   = '';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('pagin').style.display     = 'none';
  }
}

// ============================================================
//  FETCH DATA
// ============================================================
function fetchData() {
  hideAlert();

  if (currentTab !== 'analytics') {
    const s = document.getElementById('startDate').value;
    const e = document.getElementById('endDate').value;
    if (!s || !e)                  { showAlert('⚠️ Please select both From and To dates!'); return; }
    if (new Date(s) > new Date(e)) { showAlert('🚫 End Date cannot be before Start Date!'); return; }
  }

  if (currentTab === 'search' && !document.getElementById('payMethod').value)
    { showAlert('⚠️ Please select a Payment Method!'); return; }

  const myTab = currentTab; // capture locally — won't be overwritten by other tabs

  document.getElementById('content').innerHTML      = '';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('pagin').style.display     = 'none';
  document.getElementById('loader').style.display    = 'block';
  lockButtons();

  function onDataReady() {
    document.getElementById('loader').style.display = 'none';
    unlockButtons();

    // Process + cache result for the tab that initiated the fetch
    processAndCache(myTab);

    // Only render if user is still on the same tab that clicked Fetch
    if (currentTab === myTab) restoreFromCache(myTab);
  }

  if (allData && !isDataStale()) {
    // Raw data cached and still fresh — skip API call, just re-process
    isFetching = false;
    onDataReady();
  } else if (isFetching) {
    // Another request is already in-flight — queue this action, don't send a new call
    pendingCallbacks.push(onDataReady);
  } else {
    // First ever fetch — call the API
    isFetching = true;
    fetchWithTimeout(API_URL + '?action=getAll')
      .then(r => r.json())
      .then(data => {
        if (data.error) throw new Error(data.error);
        allData          = data;
        allDataTimestamp = Date.now();
        normalizeAllDates(allData);
        isFetching = false;
        populateDropdowns(data.dropdown);
        onDataReady();
        // Execute all queued callbacks
        pendingCallbacks.forEach(cb => cb());
        pendingCallbacks = [];
      })
      .catch(err => {
        isFetching = false;
        document.getElementById('loader').style.display = 'none';
        unlockButtons();
        showAlert('❌ Error: ' + err.message);
        pendingCallbacks = [];
      });
  }
}

function populateDropdowns(dropdown) {
  if (!dropdown) return;
  const pay     = document.getElementById('payMethod');
  const savedPay = pay.value; // preserve user's selection
  pay.innerHTML  = '<option value="">-- Select Method --</option><option value="All">All Payments</option>';
  (dropdown.paymentMethods || []).forEach(m => pay.innerHTML += `<option value="${m}">${m}</option>`);
  if (savedPay) pay.value = savedPay; // restore — no-op if option no longer exists

  const cat      = document.getElementById('expCategory');
  const savedCat = cat.value; // preserve user's selection
  cat.innerHTML  = '<option value="All">All Categories</option>';
  (dropdown.expenseCategories || []).forEach(c => cat.innerHTML += `<option value="${c}">${c}</option>`);
  if (savedCat) cat.value = savedCat; // restore — no-op if option no longer exists
}

// Converts any date string format to "yyyy-MM-dd"
// Handles: "2026-04-01", "Wed Apr 01 2026...", "2026-04-01T18:30:00.000Z", etc.
function normalizeDateStr(val) {
  if (!val) return '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(val)) return val; // already correct
  const d = new Date(val);
  if (isNaN(d.getTime())) return val; // unparseable — return as-is
  // Use local date parts to avoid UTC day-shift
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function normalizeAllDates(data) {
  (data.guests   || []).forEach(g => { g.checkOutDate = normalizeDateStr(g.checkOutDate); });
  (data.expenses || []).forEach(e => { e.date         = normalizeDateStr(e.date); });
}

// processAndCache — reads current UI filter values, processes allData, stores in tabCache[tab]
function processAndCache(tab) {
  const sDate = document.getElementById('startDate').value;
  const eDate = document.getElementById('endDate').value;

  if (tab === 'analytics') {
    // Analytics always uses full month — date pickers are hidden on this tab
    // so they may hold stale values from another tab
    const aStart = '2026-04-01';
    const aEnd   = '2026-04-30';
    const guests   = filterByDate(allData.guests   || [], 'checkOutDate', aStart, aEnd);
    const expenses = filterByDate(allData.expenses || [], 'date',         aStart, aEnd);
    const totalFood = guests.reduce((s, g) => s + g.food.total, 0);
    const totalRoom = guests.reduce((s, g) => s + g.room.total, 0);
    const totalRev  = totalFood + totalRoom;
    const totalExp  = expenses.reduce((s, d) => s + d.dailyTotal, 0);
    const netProfit = totalRev - totalExp;
    const revenueSource = { '🍴 Food': totalFood, '🛏️ Room': totalRoom };
    const revByMethod = {}, expByCategory = {}, expByMethod = {};
    guests.forEach(g => [...g.food.pairs, ...g.room.pairs].forEach(p => {
      if (p.paymentMethod) revByMethod[p.paymentMethod] = (revByMethod[p.paymentMethod] || 0) + p.amount;
    }));
    expenses.forEach(d => d.entries.forEach(e => {
      expByCategory[e.type]        = (expByCategory[e.type] || 0) + e.amount;
      expByMethod[e.paymentMethod] = (expByMethod[e.paymentMethod] || 0) + e.amount;
    }));
    tabCache.analytics = { totalRev, totalExp, netProfit, revenueSource, revByMethod, expByCategory, expByMethod };
    return;
  }

  if (tab === 'revenue') {
    const guests = filterByDate(allData.guests || [], 'checkOutDate', sDate, eDate);
    const dash   = computeRevenueDash(guests);
    tabCache.revenue = guests.length ? { data: guests, dash } : null;

  } else if (tab === 'expenses') {
    const expenses = filterByDate(allData.expenses || [], 'date', sDate, eDate);
    const category = document.getElementById('expCategory').value;
    const filtered = category === 'All' ? expenses : expenses.map(d => ({
      ...d,
      entries:    d.entries.filter(e => e.type === category),
      dailyTotal: d.entries.filter(e => e.type === category).reduce((s, e) => s + e.amount, 0)
    })).filter(d => d.entries.length > 0);
    const dash = computeExpenseDash(expenses, category);
    tabCache.expenses = filtered.length ? { data: filtered, dash } : null;

  } else if (tab === 'search') {
    const method    = document.getElementById('payMethod').value;
    const transType = document.getElementById('transType').value;
    const rows      = buildSearchRows(allData.guests || [], allData.expenses || [], sDate, eDate, method, transType);
    const dash      = computeSearchDash(rows, method, transType);
    tabCache.search = rows.length ? { data: rows, dash } : null;
  }
}

// restoreFromCache — renders whatever is stored in tabCache[tab]
function restoreFromCache(tab) {
  if (tab === 'analytics') {
    if (!tabCache.analytics) { showNoRecords(); return; }
    renderAnalyticsFromCache(tabCache.analytics);
    return;
  }

  const cache = tabCache[tab];
  if (!cache) { showNoRecords(); return; }

  curPage = 1; perPage = 10;
  document.getElementById('pageSize').value = '10';
  globalData = cache.data;
  renderDashboard(tab, cache.dash);
  renderUI();
}

// ============================================================
//  DATE UTILS
// ============================================================
function filterByDate(arr, field, s, e) {
  if (!s || !e) return arr;
  return arr.filter(item => item[field] >= s && item[field] <= e);
}

function fmtDate(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function updateTransHint() {
  const v = document.getElementById('transType').value;
  const h = document.getElementById('transHint');
  if (v === 'All')     h.innerHTML = '';
  else if (v === 'Revenue') h.innerHTML = "📥 <span style='color:#27ae60;'><b>Only Revenue</b></span>";
  else                 h.innerHTML = "📤 <span style='color:#c0392b;'><b>Only Expense</b></span>";
}

// ============================================================
//  COMPUTE DASHBOARD DATA
// ============================================================
function computeRevenueDash(guests) {
  let totalFood = 0, totalRoom = 0;
  const methods = {};
  guests.forEach(g => {
    totalFood += g.food.total;
    totalRoom += g.room.total;
    [...g.food.pairs, ...g.room.pairs].forEach(p => {
      if (p.paymentMethod) methods[p.paymentMethod] = (methods[p.paymentMethod] || 0) + p.amount;
    });
  });
  return { totalFood, totalRoom, grandTotal: totalFood + totalRoom, methods };
}

function computeExpenseDash(expenses, category) {
  const byCategory = {}, byMethod = {};
  let grandTotal = 0;
  expenses.forEach(day => {
    day.entries.forEach(e => {
      if (category !== 'All' && e.type !== category) return;
      byCategory[e.type]          = (byCategory[e.type] || 0) + e.amount;
      byMethod[e.paymentMethod]   = (byMethod[e.paymentMethod] || 0) + e.amount;
      grandTotal += e.amount;
    });
  });
  return { byCategory, byMethod, grandTotal, category };
}

function buildSearchRows(guests, expenses, sDate, eDate, method, transType) {
  const gFiltered = filterByDate(guests, 'checkOutDate', sDate, eDate);
  const eFiltered = filterByDate(expenses, 'date', sDate, eDate);
  const dateMap   = {};

  if (transType !== 'Expense') {
    gFiltered.forEach(g => {
      const matchingPairs = [...g.food.pairs, ...g.room.pairs].filter(p =>
        method === 'All' || p.paymentMethod === method
      );
      if (!matchingPairs.length) return;
      if (!dateMap[g.checkOutDate]) dateMap[g.checkOutDate] = { date: g.checkOutDate, incomes: [], expenseEntries: [] };
      const fPairs = g.food.pairs.filter(p => method==='All'||p.paymentMethod===method);
      const rPairs = g.room.pairs.filter(p => method==='All'||p.paymentMethod===method);
      dateMap[g.checkOutDate].incomes.push({
        guestName: g.guestName || '(No Name)',
        foodPairs: fPairs,
        roomPairs: rPairs,
        foodTotal: fPairs.reduce((s,p)=>s+p.amount,0),
        roomTotal: rPairs.reduce((s,p)=>s+p.amount,0),
        pairs:     matchingPairs
      });
    });
  }

  if (transType !== 'Revenue') {
    eFiltered.forEach(day => {
      const matching = day.entries.filter(e => method === 'All' || e.paymentMethod === method);
      if (!matching.length) return;
      if (!dateMap[day.date]) dateMap[day.date] = { date: day.date, incomes: [], expenseEntries: [] };
      matching.forEach(e => dateMap[day.date].expenseEntries.push(e));
    });
  }

  return Object.values(dateMap).sort((a, b) => a.date.localeCompare(b.date));
}

function computeSearchDash(rows, method, transType) {
  let totalReceived = 0, totalPaid = 0;
  rows.forEach(r => {
    (r.incomes || []).forEach(i => totalReceived += i.pairs.reduce((s,p)=>s+p.amount,0));
    (r.expenseEntries || []).forEach(e => totalPaid += e.amount);
  });
  return { totalReceived, totalPaid, method, transType };
}

// ============================================================
//  FILTER CHIPS
// ============================================================
function applyFilter(filter, event) {
  activeGuestFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  curPage = 1;
  renderUI();
}

function getFilteredData() {
  if (currentTab !== 'revenue' || activeGuestFilter === 'all') return globalData;
  return globalData.filter(g => {
    if (activeGuestFilter === 'food') return g.food.total > 0 && g.room.total === 0;
    if (activeGuestFilter === 'room') return g.room.total > 0 && g.food.total === 0;
    if (activeGuestFilter === 'both') return g.food.total > 0 && g.room.total > 0;
    if (activeGuestFilter === 'zero') return g.grandTotal === 0;
    return true;
  });
}

// ============================================================
//  RENDER UI (table or cards)
// ============================================================
function renderUI() {
  const filtered   = getFilteredData();
  const mode       = window.innerWidth < 600 ? 'card' : 'table';
  const pagin      = document.getElementById('pagin');
  const totalPages = Math.ceil(filtered.length / perPage) || 1;

  pagin.style.display = 'flex';

  const rcEl = document.getElementById('recordCount');
  if (rcEl) rcEl.innerHTML = `📋 Total Records: <span style="color:#2980b9;font-size:1.15em;">${filtered.length}</span>`;

  const pageTxt = document.getElementById('pageTxt');
  const prevB   = document.getElementById('prevB');
  const nextB   = document.getElementById('nextB');
  const sizeVal = document.getElementById('pageSize').value;

  if (sizeVal === 'all') {
    pageTxt.innerText = `Showing All ${filtered.length} records`;
    prevB.style.display = 'none'; nextB.style.display = 'none';
  } else {
    pageTxt.innerText = `Page ${curPage} of ${totalPages}`;
    prevB.style.display = 'inline-block'; nextB.style.display = 'inline-block';
    prevB.disabled = curPage === 1; nextB.disabled = curPage === totalPages;
  }

  const start    = (curPage - 1) * perPage;
  const pageData = filtered.slice(start, start + perPage);
  document.getElementById('content').innerHTML = mode === 'table' ? buildTable(pageData) : buildCards(pageData);
}

// ============================================================
//  TABLE BUILDER

      const fStr = g.food.pairs.map(p => `${p.paymentMethod}: ₹${fmt(p.amount)}`).join('<br>') || '-';
      const rStr = g.room.pairs.map(p => `${p.paymentMethod}: ₹${fmt(p.amount)}`).join('<br>') || '-';

        <td style="white-space:nowrap;">${fmtDate(g.checkOutDate)}</td>

    html += `<div class="table-res"><table>

      html += r + `</tr>`;
    });
    html += `</table></div>`;
  }
  return html;
}

// ============================================================
//  CARD BUILDER (mobile)
// ============================================================
function buildCards(data) {
  let html = `<div class="card-grid">`;
  data.forEach(item => {
    html += `<div class="card">`;
    if (currentTab === 'revenue') {
      const fStr = item.food.pairs.map(p => `${p.paymentMethod}: ₹${fmt(p.amount)}`).join(' | ') || '-';
      const rStr = item.room.pairs.map(p => `${p.paymentMethod}: ₹${fmt(p.amount)}`).join(' | ') || '-';
      html += `<h4 style="margin-top:0;">${fmtDate(item.checkOutDate)}</h4>
        <div style="font-size:1.1em;margin-bottom:10px;color:#2980b9;"><b>${item.guestName || '-'}</b></div>`;
      if (item.food.total) html += `<b>🍴 Food:</b> <span style="font-size:0.9em;">${fStr}</span><br>`;
      if (item.room.total) html += `<b>🛏️ Room:</b> <span style="font-size:0.9em;">${rStr}</span><br>`;
      if (item.grandTotal) html += `<hr><div class="total-line">Grand Total: ₹${fmt(item.grandTotal)}</div>`;
      else html += `<div class="empty-state">No billing data.</div>`;

    } else if (currentTab === 'expenses') {
      html += `<h4 style="margin-top:0;">${fmtDate(item.date)}</h4>`;
      if (item.entries && item.entries.length) {
        html += `<ul style="margin:0;padding-left:15px;font-size:0.95em;">`;
        item.entries.forEach(e => html += `<li style="margin-bottom:5px;">${e.item} <span style="color:#7f8c8d;">(${e.type})</span><br>${e.paymentMethod}: <b>₹${fmt(e.amount)}</b></li>`);
        html += `</ul><hr><div class="total-line" style="color:#d35400;">Daily Total: ₹${fmt(item.dailyTotal)}</div>`;
      } else html += `<div class="empty-state">No records.</div>`;

    } else if (currentTab === 'search') {
      const transType = document.getElementById('transType').value;
      html += `<h4 style="background:#2c3e50;color:white;padding:12px 18px;margin:-18px -18px 15px -18px;border-radius:10px 10px 0 0;">🗓️ ${fmtDate(item.date)}</h4>`;
      if (transType !== 'Expense') {
        if (item.incomes && item.incomes.length) {
          item.incomes.forEach(i => {
            const foodStr = (i.foodPairs||[]).map(p=>`${p.paymentMethod}: ${fmt(p.amount)}`).join(' + ') || '-';
            const roomStr = (i.roomPairs||[]).map(p=>`${p.paymentMethod}: ${fmt(p.amount)}`).join(' + ') || '-';
            const total   = (i.foodTotal||0) + (i.roomTotal||0);
            html += `<div style="margin-bottom:8px;">
              <b style="color:#2980b9;">👤 ${i.guestName}</b><br>
              <span style="font-size:0.9em;color:#555;">Food: ${foodStr} | Room: ${roomStr}</span><br>
              <b style="color:#27ae60;font-size:1.1em;">₹${fmt(total)}</b>
            </div><hr style="margin:8px 0;border:0;border-top:1px dashed #ccc;">`;
          });
        } else html += `<div class="empty-state">No Revenue</div>`;
      }
      if (transType !== 'Revenue') {
        if (item.expenseEntries && item.expenseEntries.length) {
          item.expenseEntries.forEach(e => html +=
            `<div style="margin-bottom:5px;overflow:hidden;">• ${e.item} <span style="color:#2980b9;font-weight:bold;">[${e.paymentMethod}]</span> <span style="color:#7f8c8d;">(${e.type})</span><b style="color:#c0392b;float:right;">₹${fmt(e.amount)}</b></div>`
          );
        } else html += `<div class="empty-state">No Expenses</div>`;
      }
    } // end search block
    html += `</div>`;
  });
  return html + `</div>`;
}

// ============================================================
//  ANALYTICS
// ============================================================

      <div style="background:#2980b9;color:white;padding:15px;border-radius:10px;text-align:center;">
        <small>Total Revenue</small><br><b style="font-size:1.6em;">₹${fmt(d.totalRev)}</b>
      </div>
      <div style="background:#e67e22;color:white;padding:15px;border-radius:10px;text-align:center;">
        <small>Total Expenses</small><br><b style="font-size:1.6em;">₹${fmt(d.totalExp)}</b>
      </div>
      <div style="background:${netColor};color:white;padding:15px;border-radius:10px;text-align:center;">
        <small>Net Profit/Loss</small><br><b style="font-size:1.6em;">₹${fmt(d.netProfit)}</b>
      </div>
    </div>
    <div class="chart-container">
      <div class="chart-box" style="border-top:5px solid #2ecc71;">
        <h4 style="text-align:center;margin-top:0;">📊 Income vs Expense</h4>
        <div id="chartIncomeExp" style="height:250px;"></div>
        ${analyticsTable({'Total Revenue':d.totalRev,'Total Expense':d.totalExp}, d.totalRev+d.totalExp, 'Item')}
      </div>
      <div class="chart-box">
        <h4 style="text-align:center;margin-top:0;">🍽️ Revenue Source</h4>
        <div id="chartRevSource" style="height:250px;"></div>
        ${analyticsTable(d.revenueSource, d.totalRev, 'Source')}
      </div>
      <div class="chart-box">
        <h4 style="text-align:center;margin-top:0;">💳 Revenue by Method</h4>
        <div id="chartRevMethod" style="height:250px;"></div>
        ${analyticsTable(d.revByMethod, d.totalRev, 'Method')}

      <div class="chart-box">
        <h4 style="text-align:center;margin-top:0;">🛠️ Expense Categories</h4>
        <div id="chartExpCat" style="height:250px;"></div>
        ${analyticsTable(d.expByCategory, d.totalExp, 'Category')}

function drawAnalyticsCharts(d) {
  drawDonut({'Total Revenue': d.totalRev, 'Total Expense': d.totalExp}, 'chartIncomeExp', {'Total Revenue':'#2980b9','Total Expense':'#e74c3c'});
  drawDonut(d.revenueSource,  'chartRevSource');
  drawDonut(d.revByMethod,    'chartRevMethod');
  drawDonut(d.expByCategory,  'chartExpCat');
  drawDonut(d.expByMethod,    'chartExpMethod');
}

function drawDonut(dataObj, elId, colorMap) {
  const el = document.getElementById(elId);
  if (!el) return;
  if (!chartsReady) { el.innerHTML = `<p style="text-align:center;color:#95a5a6;margin-top:100px;">Charts loading...</p>`; return; }
  const filtered = Object.fromEntries(Object.entries(dataObj).filter(([,v]) => v > 0));
  if (!Object.keys(filtered).length) { el.innerHTML = `<p style="text-align:center;color:#95a5a6;margin-top:100px;">No Data Yet</p>`; return; }
  const arr  = [['Task','Value'], ...Object.entries(filtered)];
  const data = google.visualization.arrayToDataTable(arr);
  const opts = {
    pieHole: 0.4, chartArea: { width: '90%', height: '75%' },
    legend: { position: 'bottom', textStyle: { fontSize: 13, bold: true } },
    pieSliceText: 'none', tooltip: { trigger: 'focus', showColorCode: true }
  };
  if (colorMap) {
    const colors = Object.keys(filtered).map(k => colorMap[k]).filter(Boolean);
    if (colors.length) opts.colors = colors;
  }
  new google.visualization.PieChart(el).draw(data, opts);
}

function analyticsTable(obj, total, label) {
  const filtered = Object.fromEntries(Object.entries(obj).filter(([,v]) => v > 0));
  const sorted   = Object.entries(filtered).sort((a,b) => b[1]-a[1]);
  let html = `<div style="overflow-x:auto;"><table class="perc-table">
    <tr><th>${label}</th><th>Amount</th><th>%</th></tr>`;
  if (!sorted.length) html += `<tr><td colspan="3" style="text-align:center;color:#95a5a6;">No Data Yet</td></tr>`;
  sorted.forEach(([k,v]) => {
    const pct = total > 0 ? ((v/total)*100).toFixed(1) : 0;
    html += `<tr><td><b>${k}</b></td><td>₹${fmt(v)}</td><td style="color:#2980b9;"><b>${pct}%</b></td></tr>`;
  });
  html += `<tr style="background:#f1f7ff;border-top:2px solid #ddd;">
    <td><b>Grand Total</b></td><td><b>₹${fmt(total)}</b></td><td></td></tr>
  </table></div>`;
  return html;
}

// ============================================================
//  PAGINATION
// ============================================================
function changePage(dir) {
  curPage += dir;
  renderUI();
  window.scrollTo(0, document.getElementById('dashboard').offsetTop - 20);
}

function changePageSize() {
  const v = document.getElementById('pageSize').value;
  perPage = v === 'all' ? (globalData.length || 1) : parseInt(v);
  curPage = 1;
  renderUI();
}

// ============================================================
//  HELPERS
// ============================================================
function fmt(n) { return Number(n || 0).toLocaleString('en-IN'); }



function showNoRecords() {
  document.getElementById('content').innerHTML = `<h3 style="text-align:center;color:#7f8c8d;margin-top:40px;">No records found for the selected criteria.</h3>`;
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('pagin').style.display     = 'none';
}

function showAlert(msg) {
  const bar = document.getElementById('alertBar');
  bar.innerText = msg; bar.style.display = 'block';
  setTimeout(() => bar.style.opacity = '1', 10);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function hideAlert() {
  const bar = document.getElementById('alertBar');
  bar.style.opacity = '0';
  setTimeout(() => { if (bar.style.opacity === '0') bar.style.display = 'none'; }, 400);
}

// ============================================================
//  REMARKS MODAL
// ============================================================
function getRemarks() {
  const remarksTab = currentTab; // capture which tab initiated this
  lockButtons();

  function showRemarks() {
    unlockButtons();

    // If user switched tabs, don't show modal — data is cached for next click
    if (currentTab !== remarksTab) return;

    const modal = document.getElementById('remarksModal');
    const title = document.getElementById('remarksModalTitle');
    const body  = document.getElementById('remarksModalBody');

    let html = '';

    if (remarksTab === 'revenue') {
      title.textContent = '\ud83d\udcdd Guest Remarks \u2014 Whole Month';
      const withRemarks = (allData.guests || []).filter(g => g.remarks && g.remarks.trim() !== '');
      if (!withRemarks.length) {
        html = '<div class="modal-empty">No guest remarks found for this month.</div>';
      } else {
        html = `<table><tr><th>Date</th><th>Guest & Total</th><th>Remarks</th></tr>`;
        withRemarks.forEach(g => {
          html += `<tr>
            <td style="white-space:nowrap;">${fmtDate(g.checkOutDate)}</td>
            <td><b>${g.guestName || '-'}</b><br><span style="color:#27ae60;font-weight:bold;">\u20b9${fmt(g.grandTotal)}</span></td>
            <td>${g.remarks}</td>
          </tr>`;
        });
        html += `</table>`;
      }
    } else if (remarksTab === 'expenses') {
      title.textContent = '\ud83d\udcdd Expense Remarks \u2014 Whole Month';
      const withRemarks = (allData.expenses || []).filter(e => e.remarks && e.remarks.trim() !== '');
      if (!withRemarks.length) {
        html = '<div class="modal-empty">No expense remarks found for this month.</div>';
      } else {
        html = `<table><tr><th>Date</th><th>Remarks</th></tr>`;
        withRemarks.forEach(e => {
          html += `<tr>
            <td style="white-space:nowrap;">${fmtDate(e.date)}</td>
            <td>${e.remarks}</td>
          </tr>`;
        });
        html += `</table>`;
      }
    }

    body.innerHTML = html;
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  // Use allData if available and fresh
  if (allData && !isDataStale()) {
    showRemarks();
  } else if (isFetching) {
    // Another request is already in-flight — queue this action
    pendingCallbacks.push(showRemarks);
  } else {
    isFetching = true;
    fetchWithTimeout(API_URL + '?action=getAll')
      .then(r => r.json())
      .then(data => {
        if (data.error) throw new Error(data.error);
        allData          = data;
        allDataTimestamp = Date.now();
        normalizeAllDates(allData);
        isFetching = false;
        populateDropdowns(data.dropdown);
        showRemarks();
        pendingCallbacks.forEach(cb => cb());
        pendingCallbacks = [];
      })
      .catch(err => {
        isFetching = false;
        unlockButtons();
        showAlert('\u274c Error loading remarks: ' + err.message);
        pendingCallbacks = [];
      });
  }
}

function closeRemarks() {
  document.getElementById('remarksModal').classList.remove('open');
  document.body.style.overflow = ''; // restore page scroll
}
