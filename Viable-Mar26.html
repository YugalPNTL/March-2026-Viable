<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mar 2026 Viable</title>

    <script src="https://www.gstatic.com/charts/loader.js"></script>

    <style>
        /* --- General Styling --- */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 15px;
            color: #333;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        /* --- Tabs Styling --- */
        .tabs {
            display: flex;
            border-bottom: 2px solid #ddd;
            margin-bottom: 20px;
            overflow-x: auto;
            gap: 5px;
            padding-bottom: 2px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 200;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            margin-left: -20px;
            margin-right: -20px;
            padding-left: 20px;
            padding-right: 20px;
        }

        .tab-btn {
            padding: 12px 20px;
            cursor: pointer;
            border: none;
            background: none;
            font-weight: bold;
            font-size: 1.05em;
            color: #7f8c8d;
            transition: 0.3s;
            white-space: nowrap;
            border-radius: 5px 5px 0 0;
        }

        .tab-btn:hover {
            color: #2c3e50;
            background: #f8f9fa;
        }

        .tab-btn.active {
            color: #3498db;
            border-bottom: 3px solid #3498db;
            background: #ebf5fb;
            margin-bottom: -2px;
        }

        /* --- Alert and Loader --- */
        #alertBar {
            display: none;
            background: #e74c3c;
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            position: relative;
            z-index: 1000;
        }

        #loader {
            display: none;
            text-align: center;
            color: #34495e;
            font-weight: bold;
            margin: 20px 0;
            font-size: 1.1em;
            font-style: italic;
        }

        /* [Point 5 FIX] CSS Spinner instead of external Imgur image */
        .css-spinner {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 3px solid #ccc;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* --- Dashboard Summary --- */
        .dashboard {
            display: none;
            background: #ebf5fb;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 6px solid #3498db;
        }

        .dashboard h3 {
            margin-top: 0;
            color: #2c3e50;
        }

        .dash-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .dash-grid ul {
            margin: 5px 0 0 0;
            padding-left: 20px;
            font-size: 0.95em;
        }

        .grand-total {
            font-size: 1.4em;
            color: #d35400;
            text-align: center;
            margin-top: 15px;
            border-top: 1px solid #ccc;
            padding-top: 10px;
            font-weight: bold;
        }

        /* --- Controls Section --- */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .controls div {
            display: flex;
            flex-direction: column;
            min-width: 160px;
        }

        .controls label {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: #2c3e50;
        }

        input[type="date"],
        select {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-family: inherit;
            font-size: 1em;
            background: white;
        }

        button.fetch-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-size: 1em;
            align-self: flex-start;
            margin-top: 0px;
        }

        button.fetch-btn:hover {
            background: #219150;
            transform: translateY(-1px);
        }

        button.fetch-btn:disabled {
            background: #c0392b;
            cursor: not-allowed;
            opacity: 0.9;
            transform: none;
        }

        /* --- Table & Card Styling --- */
        .table-res {
            overflow-x: auto;
            overflow-y: auto;
            max-height: 70vh;
            margin-top: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            width: 100%;
        }

        .table-res table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            min-width: 600px;
        }

        .table-res th,
        .table-res td {
            border: 1px solid #eee;
            padding: 12px;
            text-align: left;
        }

        /* [Point 6 FIX] Removed dead position:sticky from th (doesn't work with overflow-x:auto parent) */
        .table-res th {
            background: #34495e;
            color: white;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        tr:nth-child(even) {
            background-color: #fcfcfc;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 18px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.08);
        }

        .empty-state {
            color: #95a5a6;
            font-style: italic;
            padding: 8px 0;
        }

        .total-line {
            font-weight: bold;
            font-size: 1.1em;
            padding-top: 8px;
        }

        /* --- Pagination --- */
        .pagination {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .p-btn {
            padding: 10px 18px;
            background: #34495e;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .p-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }

        /* --- Analytics Section --- */
        .chart-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .chart-box {
            background: #fff;
            border: 1px solid #e0e0e0;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            width: 100%;
            overflow: hidden;
        }

        .perc-table {
            width: 100% !important;
            min-width: auto !important;
            margin-top: 15px;
            font-size: 0.85em;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .perc-table th {
            background: #f8f9fa;
            color: #2c3e50;
            padding: 10px 5px;
            border-bottom: 2px solid #ddd;
            text-align: left;
        }

        .perc-table td {
            padding: 10px 5px;
            border-bottom: 1px solid #eee;
            text-align: left;
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: normal;
        }

        .perc-table th:nth-child(1),
        .perc-table td:nth-child(1) {
            width: 45%;
        }

        .perc-table th:nth-child(2),
        .perc-table td:nth-child(2) {
            width: 35%;
            white-space: nowrap;
        }

        .perc-table th:nth-child(3),
        .perc-table td:nth-child(3) {
            width: 20%;
        }

        /* --- Guest Filter Chips --- */
        .filter-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0 5px 0;
            justify-content: center;
        }

        #recordCount {
            text-align: center;
            font-weight: bold;
            color: #2c3e50;
            font-size: 1em;
            margin: 8px 0 10px 0;
            min-height: 1.4em;
        }

        .filter-chip {
            padding: 8px 18px;
            border-radius: 20px;
            border: 2px solid #27ae60;
            background: white;
            color: #27ae60;
            font-weight: bold;
            font-size: 0.9em;
            cursor: pointer;
            transition: 0.2s;
        }

        .filter-chip:hover {
            background: #27ae60;
            color: white;
        }

        .filter-chip.active {
            background: #1a7a44;
            border-color: #1a7a44;
            color: white;
        }

        /* --- Mobile Responsive --- */
        @media (max-width: 600px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .controls div {
                min-width: 100%;
            }

            button.fetch-btn {
                margin-top: 10px;
                width: 100%;
            }

            .tab-btn {
                padding: 10px 15px;
                font-size: 0.95em;
            }

            .chart-container {
                grid-template-columns: 1fr;
            }

            .chart-box {
                padding: 10px;
            }

            .perc-table {
                font-size: 0.8em;
            }

            .card-grid {
                grid-template-columns: 1fr;
            }
        }

        .google-visualization-tooltip {
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2 style="text-align: center; color: #2c3e50; margin-bottom: 5px;">Revenue, Expense, Analytics</h2>
        <div style="text-align: center; font-weight: bold; color: #7f8c8d; margin-bottom: 20px; font-size: 1.1em;">
            🏨 Viable Inn | 📅 March 2026
        </div>

        <div class="tabs">
            <!-- [Point 3 FIX] Tab names now match their labels: revenue, expenses, search, analytics -->
            <button class="tab-btn active" onclick="switchTab('revenue', this)">🛏️ Revenue</button>
            <button class="tab-btn" onclick="switchTab('expenses', this)">💸 Expenses</button>
            <button class="tab-btn" onclick="switchTab('search', this)">🔍 Payment Search</button>
            <button class="tab-btn" style="color:#d35400;" onclick="switchTab('analytics', this)">📊 Analytics</button>
        </div>

        <div id="alertBar"></div>

        <div class="controls">
            <div id="dateStartBox">
                <label>From Date:</label>
                <input type="date" id="startDate" value="2026-03-01" onclick="this.showPicker()">
                <div style="font-size: 0.82em; margin-top: 3px; min-height: 1.2em;"></div>
            </div>
            <div id="dateEndBox">
                <label>To Date:</label>
                <input type="date" id="endDate" value="2026-03-31" onclick="this.showPicker()">
                <div style="font-size: 0.82em; margin-top: 3px; min-height: 1.2em;"></div>
            </div>
            <div id="categoryContainer" style="display: none; min-width: 160px; max-width: 190px;">
                <label>Expense Category:</label>
                <select id="expCategory" style="width: 100%;"></select>
                <div id="catHint"
                    style="font-size: 0.82em; margin-top: 3px; font-weight: bold; min-height: 1.2em; line-height: 1.2;">
                </div>
            </div>
            <div id="methodContainer" style="display: none; min-width: 160px; max-width: 190px;">
                <label>Payment Method:</label>
                <select id="payMethod" style="width: 100%;"></select>
                <div id="searchHint"
                    style="font-size: 0.82em; margin-top: 3px; font-weight: bold; min-height: 1.2em; line-height: 1.2;">
                </div>
            </div>
            <div id="transTypeContainer" style="display: none; min-width: 160px;">
                <label>Transaction Type:</label>
                <select id="transType" style="width: 100%;" onchange="updateTransHint()">
                    <option value="All">All</option>
                    <option value="Revenue">Revenue</option>
                    <option value="Expense">Expense</option>
                </select>
                <div id="transHint"
                    style="font-size: 0.82em; margin-top: 3px; font-weight: bold; min-height: 1.2em; line-height: 1.2;">
                </div>
            </div>
            <div>
                <label style="visibility: hidden;">Fetch</label>
                <button id="fetchBtn" class="fetch-btn" onclick="fetchData()">Fetch Data</button>
                <div style="font-size: 0.82em; margin-top: 3px; min-height: 1.2em;"></div>
            </div>

        </div>

        <!-- [Point 5 FIX] CSS spinner instead of external Imgur image -->
        <div id="loader"><span class="css-spinner"></span> Fetching data, please wait...</div>
        <div id="dashboard" class="dashboard"></div>
        <div id="content"></div>

        <div class="pagination" id="pagin">
            <button class="p-btn" id="prevB" onclick="changePage(-1)">Previous</button>
            <span id="pageTxt" style="font-weight: bold; color: #2c3e50;"></span>
            <button class="p-btn" id="nextB" onclick="changePage(1)">Next</button>
            <select id="pageSize" class="page-size-select" onchange="changePageSize()">
                <option value="10">10 / page</option>
                <option value="20">20 / page</option>
                <option value="50">50 / page</option>
                <option value="all">View All</option>
            </select>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw2z8p7SYQsd76L2vdtPyZR4jecKMJq_trlrPjmA6Hhl751uig2Wms8g8Lse49QyL_y/exec";

        function updateTransHint() {
            let val = document.getElementById('transType').value;
            let hint = document.getElementById('transHint');
            if (val === 'All') hint.innerHTML = "";
            else if (val === 'Revenue') hint.innerHTML = "📥 <span style='color:#27ae60;'><b>Only Revenue</b> Shown</span>";
            else if (val === 'Expense') hint.innerHTML = "📤 <span style='color:#c0392b;'><b>Only Expense</b> Shown</span>";
        }

        // [Point 3 FIX] Default tab is now 'revenue' (was 'guests')
        let currentTab = 'revenue'; let globalData = []; let curPage = 1; let perPage = 10; let activeGuestFilter = 'all';
        window.lastAnalyticsData = null;

        // Per-tab state: caches fetched data so tab-switching doesn't lose it
        let tabCache = { revenue: null, expenses: null, search: null, analytics: null };
        let tabFetching = { revenue: false, expenses: false, search: false, analytics: false };

        // [Point 4 FIX] Track whether Google Charts is ready
        let chartsReady = false;
        google.charts.load('current', { 'packages': ['corechart'] });
        google.charts.setOnLoadCallback(function () { chartsReady = true; });

        window.addEventListener('load', function () {
            // [Point 7 FIX] Added user-facing error alerts for dropdown API failures
            fetch(API_URL + "?action=getDropdownMethods")
                .then(res => res.json())
                .then(methods => {
                    let select = document.getElementById('payMethod'); select.innerHTML = "";
                    let placeholder = document.createElement('option'); placeholder.value = ""; placeholder.text = "-- Select Method --"; select.appendChild(placeholder);
                    let allOpt = document.createElement('option'); allOpt.value = "All Payments"; allOpt.text = "All Payments"; select.appendChild(allOpt);
                    methods.forEach(m => { let opt = document.createElement('option'); opt.value = m; opt.text = m; select.appendChild(opt); });
                    select.addEventListener('change', function () {
                        let hint = document.getElementById('searchHint');
                        if (this.value === "") hint.innerText = "";
                        else if (this.value === "All Payments") hint.innerHTML = "";
                        else hint.innerHTML = "🎯 <span style='color:#27ae60;'>Only <b>" + this.value + "</b> Payments.</span>";
                    });
                }).catch(err => {
                    console.error(err);
                    showModernAlert("⚠️ Payment Methods load nahi ho paye. Page refresh karein.");
                });

            fetch(API_URL + "?action=getExpenseCategories")
                .then(res => res.json())
                .then(cats => {
                    let select = document.getElementById('expCategory'); select.innerHTML = "";
                    let allOpt = document.createElement('option'); allOpt.value = "All Categories"; allOpt.text = "All Categories"; select.appendChild(allOpt);
                    cats.forEach(c => { let opt = document.createElement('option'); opt.value = c; opt.text = c; select.appendChild(opt); });
                    select.addEventListener('change', function () {
                        let hint = document.getElementById('catHint');
                        if (this.value === "All Categories") hint.innerHTML = "📂 <span style='color:#2980b9;'>Showing results for <b>All Categories</b>.</span>";
                        else hint.innerHTML = "🎯 <span style='color:#d35400;'>Showing results for <b>" + this.value + "</b> only.</span>";
                    });
                }).catch(err => {
                    console.error(err);
                    showModernAlert("⚠️ Expense Categories load nahi ho paye. Page refresh karein.");
                });
        });

        window.addEventListener('resize', function () {
            if (currentTab === 'analytics' && window.lastAnalyticsData && chartsReady) {
                drawDonut(window.lastAnalyticsData.revenueComparison, 'foodRoomChart');
                drawDonut(window.lastAnalyticsData.revenueMode, 'cashOnlineChart');
                drawDonut(window.lastAnalyticsData.incomeAnalysis, 'incomeExpChart', { "Total Expense": '#e74c3c', "Net Profit": '#2ecc71' });
                drawDonut(window.lastAnalyticsData.expenseCategoryWise, 'expCatChart');
                drawDonut(window.lastAnalyticsData.expenseMode, 'expModeChart');
            }
            if (currentTab !== 'analytics' && globalData && globalData.length > 0) {
                renderUI();
            }
        });

        function switchTab(tabName, btnElement) {
            currentTab = tabName; activeGuestFilter = 'all';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            hideAlert();

            let isAnalytics = (tabName === 'analytics');
            document.getElementById('dateStartBox').style.display = isAnalytics ? 'none' : 'flex';
            document.getElementById('dateEndBox').style.display = isAnalytics ? 'none' : 'flex';
            document.getElementById('fetchBtn').style.display = '';

            document.getElementById('methodContainer').style.display = (tabName === 'search') ? 'flex' : 'none';
            document.getElementById('transTypeContainer').style.display = (tabName === 'search') ? 'flex' : 'none';
            document.getElementById('categoryContainer').style.display = (tabName === 'expenses') ? 'flex' : 'none';

            // If a fetch is in progress for THIS tab, show loader; otherwise hide it
            if (tabFetching[tabName]) {
                document.getElementById('loader').style.display = 'block';
                document.getElementById('content').innerHTML = '';
                document.getElementById('dashboard').style.display = 'none';
                document.getElementById('pagin').style.display = 'none';
                document.getElementById('fetchBtn').disabled = true;
                document.getElementById('fetchBtn').textContent = 'Fetching...';
                return;
            }

            document.getElementById('loader').style.display = 'none';

            // Restore cached data if available
            if (tabCache[tabName]) {
                restoreTabData(tabName);
            } else {
                document.getElementById('content').innerHTML = '';
                document.getElementById('dashboard').style.display = 'none';
                document.getElementById('pagin').style.display = 'none';
            }

            document.getElementById('fetchBtn').disabled = false;
            document.getElementById('fetchBtn').textContent = 'Fetch Data';
        }

        function restoreTabData(tabName) {
            let cached = tabCache[tabName];
            if (tabName === 'analytics') {
                renderAnalytics(cached.analyticsData);
                return;
            }
            // Restore input controls to match cached data
            if (cached.inputs) {
                document.getElementById('startDate').value = cached.inputs.startDate || '';
                document.getElementById('endDate').value = cached.inputs.endDate || '';
                if (tabName === 'expenses' && cached.inputs.category) {
                    document.getElementById('expCategory').value = cached.inputs.category;
                }
                if (tabName === 'search') {
                    if (cached.inputs.method) document.getElementById('payMethod').value = cached.inputs.method;
                    if (cached.inputs.transType) document.getElementById('transType').value = cached.inputs.transType;
                    updateTransHint();
                }
            }
            globalData = cached.data;
            curPage = cached.page || 1;
            perPage = cached.perPage || 10;
            if (tabName === 'revenue') activeGuestFilter = cached.filter || 'all';
            document.getElementById('pageSize').value = cached.pageSizeVal || '10';
            renderDashboard(cached.dashboard);
            renderUI();
        }

        function showModernAlert(msg) { const bar = document.getElementById('alertBar'); bar.innerText = msg; bar.style.display = 'block'; setTimeout(() => { bar.style.opacity = '1'; }, 10); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        function hideAlert() { const bar = document.getElementById('alertBar'); bar.style.opacity = '0'; setTimeout(() => { if (bar.style.opacity === '0') bar.style.display = 'none'; }, 400); }
        function formatDateStr(htmlDate) { let parts = htmlDate.split('-'); return `${parts[2]}/${parts[1]}/${parts[0]}`; }

        function fetchData() {
            hideAlert(); document.getElementById('content').innerHTML = ''; document.getElementById('dashboard').style.display = 'none'; document.getElementById('pagin').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            let fetchBtn = document.getElementById('fetchBtn');
            fetchBtn.disabled = true;
            fetchBtn.textContent = 'Fetching...';

            let fetchTab = currentTab;
            tabFetching[fetchTab] = true;

            if (fetchTab === 'analytics') {
                function doAnalyticsFetch() {
                    fetch(API_URL + "?action=getFullAnalyticsData")
                        .then(res => res.json())
                        .then(data => {
                            if (data.error) throw new Error(data.error);
                            tabFetching.analytics = false;
                            tabCache.analytics = { analyticsData: data };
                            if (currentTab === 'analytics') {
                                renderAnalytics(data);
                                document.getElementById('loader').style.display = 'none';
                                document.getElementById('fetchBtn').disabled = false;
                                document.getElementById('fetchBtn').textContent = 'Fetch Data';
                            }
                        })
                        .catch(err => { tabFetching[fetchTab] = false; handleErr(err); });
                }
                if (!chartsReady) {
                    google.charts.setOnLoadCallback(function () { chartsReady = true; doAnalyticsFetch(); });
                } else {
                    doAnalyticsFetch();
                }
                return;
            }

            let sDate = document.getElementById('startDate').value;
            let eDate = document.getElementById('endDate').value;

            if (!sDate || !eDate) { document.getElementById('loader').style.display = 'none'; document.getElementById('fetchBtn').disabled = false; document.getElementById('fetchBtn').textContent = 'Fetch Data'; tabFetching[fetchTab] = false; showModernAlert("⚠️ Attention: Please select both From and To dates to proceed!"); return; }
            if (new Date(sDate) > new Date(eDate)) { document.getElementById('loader').style.display = 'none'; document.getElementById('fetchBtn').disabled = false; document.getElementById('fetchBtn').textContent = 'Fetch Data'; tabFetching[fetchTab] = false; showModernAlert("🚫 Invalid Range: End Date cannot be before Start Date!"); return; }

            if (fetchTab === 'search') {
                let sel = document.getElementById('payMethod').value;
                if (!sel || sel === "") { document.getElementById('loader').style.display = 'none'; document.getElementById('fetchBtn').disabled = false; document.getElementById('fetchBtn').textContent = 'Fetch Data'; tabFetching[fetchTab] = false; showModernAlert("⚠️ Please select one option to proceed with the payment search!"); return; }
            }

            let startF = formatDateStr(sDate); let endF = formatDateStr(eDate);
            let url = API_URL;
            let fetchInputs = { startDate: sDate, endDate: eDate };

            if (fetchTab === 'revenue') {
                url += `?action=getGuestsData&start=${startF}&end=${endF}`;
            } else if (fetchTab === 'expenses') {
                let cat = document.getElementById('expCategory').value;
                fetchInputs.category = cat;
                url += `?action=getExpensesData&start=${startF}&end=${endF}&cat=${encodeURIComponent(cat)}`;
            } else if (fetchTab === 'search') {
                let sel = document.getElementById('payMethod').value;
                let tType = document.getElementById('transType').value;
                fetchInputs.method = sel;
                fetchInputs.transType = tType;
                url += `?action=getPaymentSearchData&start=${startF}&end=${endF}&method=${encodeURIComponent(sel)}&type=${encodeURIComponent(tType)}`;
            }

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.error) throw new Error(data.error);
                    tabFetching[fetchTab] = false;
                    onDataSuccess(data, fetchTab, fetchInputs);
                })
                .catch(err => { tabFetching[fetchTab] = false; handleErr(err); });
        }

        function handleErr(err) { showModernAlert("❌ Error: " + err.message); document.getElementById('loader').style.display = 'none'; document.getElementById('fetchBtn').disabled = false; document.getElementById('fetchBtn').textContent = 'Fetch Data'; }

        function onDataSuccess(response, fetchTab, fetchInputs) {
            let dataForTab;
            if (fetchTab === 'revenue') dataForTab = response.guests;
            else if (fetchTab === 'expenses') dataForTab = response.expenses;
            else if (fetchTab === 'search') dataForTab = response.records;

            let dashData;
            if (fetchTab === 'search') {
                dashData = { totalReceived: response.totalReceived, totalPaid: response.totalPaid, method: fetchInputs.method, tType: fetchInputs.transType };
            } else {
                dashData = response.dashboard;
            }

            // Cache the data for this tab including input state
            tabCache[fetchTab] = { data: dataForTab, dashboard: dashData, page: 1, perPage: 10, pageSizeVal: '10', filter: 'all', inputs: fetchInputs };

            // Only render if still on the same tab
            if (currentTab === fetchTab) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('fetchBtn').disabled = false;
                document.getElementById('fetchBtn').textContent = 'Fetch Data';
                globalData = dataForTab;
                curPage = 1; perPage = 10;
                if (fetchTab === 'revenue') activeGuestFilter = 'all';

                if (!globalData || globalData.length === 0) { document.getElementById('content').innerHTML = "<h3 style='text-align:center; color:#7f8c8d; margin-top:40px;'>No records found for the selected criteria.</h3>"; return; }

            }
        }

        function applyGuestFilter(filter, event) {

        function getFilteredData() {
            if (currentTab !== 'revenue' || activeGuestFilter === 'all') return globalData;
            return globalData.filter(item => {
                if (activeGuestFilter === 'food') return item.totalFood > 0 && item.totalRoom === 0;
                if (activeGuestFilter === 'room') return item.totalRoom > 0 && item.totalFood === 0;
                if (activeGuestFilter === 'both') return item.totalFood > 0 && item.totalRoom > 0;
                if (activeGuestFilter === 'zero') return item.grandTotal === 0;
                return true;
            });

        function renderUI() {
            if (!globalData || globalData.length === 0) { document.getElementById('pagin').style.display = 'none'; return; }
            let filteredData = getFilteredData();
            let mode = window.innerWidth < 600 ? 'card' : 'table';

                    if (item.totalFood > 0) html += `<b>🍴 Food:</b> <span style="font-size:0.9em;">${item.foodBreakdown.map(b => `${b.method}: ${b.text}`).join(' | ')}</span><br>`;
                    if (item.totalRoom > 0) html += `<b>🛏️ Room:</b> <span style="font-size:0.9em;">${item.roomBreakdown.map(b => `${b.method}: ${b.text}`).join(' | ')}</span><br>`;
                    if (item.grandTotal > 0) html += `<hr><div class="total-line">Grand Total: ₹${item.grandTotal}</div>`;
                    else html += `<div class="empty-state">No billing data.</div>`;
                } else if (currentTab === 'expenses') {
                    html += `<h4>${item.date}</h4>`;
                    if (item.sets && item.sets.length > 0) {
                        html += `<ul style="margin:0; padding-left:15px; font-size:0.95em;">`;
                        item.sets.forEach(s => { html += `<li style="margin-bottom:5px;">${s.item} (${s.type})<br><span style="color:#7f8c8d;">${s.method}:</span> <b>₹${s.amt}</b></li>`; });
                        html += `</ul><hr><div class="total-line" style="color:#d35400;">Daily Total: ₹${item.dayTotal}</div>`;
                    } else { html += `<div class="empty-state">No records.</div>`; }
                } else if (currentTab === 'search') {
                    let tType = document.getElementById('transType').value;
                    html += `<h4 style="background:#2c3e50; color:white; padding:12px 18px; margin:-18px -18px 15px -18px; border-radius:10px 10px 0 0;">🗓️ ${item.displayDate}</h4>`;
                    if (tType === "All" || tType === "Revenue") {
                        if (item.incomes && item.incomes.length > 0) {
                            item.incomes.forEach(inc => { html += `<div style="margin-bottom:8px;"><b style="color:#2980b9;">👤 ${inc.name}</b><br><span style="font-size:0.9em; color:#555;">Food: ${inc.foodStr} | Room: ${inc.roomStr}</span><br><b style="color:#27ae60; font-size:1.1em;">₹${inc.total}</b></div><hr style="margin:8px 0; border:0; border-top:1px dashed #ccc;">`; });
                        } else { html += `<div class="empty-state">No Income</div>`; }
                    }
                    if (tType === "All") { html += `<div style="margin: 20px 0 15px 0; border-top: 3px solid #bdc3c7; position:relative; text-align:center;"><span style="background:white; padding:0 10px; position:relative; top:-12px; color:#7f8c8d; font-size:0.85em; font-weight:bold;">EXPENSES</span></div>`; }
                    if (tType === "All" || tType === "Expense") {
                        if (tType === "Expense") html += `<div style="margin-bottom:10px; font-weight:bold; color:#c0392b;">📤 Expenses</div>`;
                        if (item.expenses && item.expenses.length > 0) { html += `<div style="padding-top:2px;">${item.expenses.join('')}</div>`; }
                        else { html += `<div class="empty-state">No Expenses</div>`; }
                    }
                }
                html += `</div>`;
            });
            html += `</div>`;
            return html;
        }

        function changePage(dir) { curPage += dir; renderUI(); if (tabCache[currentTab]) tabCache[currentTab].page = curPage; window.scrollTo(0, document.getElementById('dashboard').offsetTop - 20); }
    </script>
</body>

</html>
