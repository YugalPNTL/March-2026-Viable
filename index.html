<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mar 2026 Viable</title>
  
  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <style>
    /* --- General Styling --- */
    * { box-sizing: border-box; } 
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 15px; color: #333; }
    .container { max-width: 1100px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); position: relative; }
    
    /* --- Tabs Styling --- */
    .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; overflow-x: auto; gap: 5px; padding-bottom: 2px; }
    .tab-btn { padding: 12px 20px; cursor: pointer; border: none; background: none; font-weight: bold; font-size: 1.05em; color: #7f8c8d; transition: 0.3s; white-space: nowrap; border-radius: 5px 5px 0 0; }
    .tab-btn:hover { color: #2c3e50; background: #f8f9fa; }
    .tab-btn.active { color: #3498db; border-bottom: 3px solid #3498db; background: #ebf5fb; }

    /* --- Alert and Loader --- */
    #alertBar { display: none; background: #e74c3c; color: white; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); opacity: 0; transition: opacity 0.4s ease-in-out; position: relative; z-index: 1000; }
    #loader { display: none; text-align: center; color: #34495e; font-weight: bold; margin: 20px 0; font-size: 1.1em; font-style: italic; }

    /* --- Dashboard Summary --- */
    .dashboard { display: none; background: #ebf5fb; padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 6px solid #3498db; }
    .dashboard h3 { margin-top: 0; color: #2c3e50; }
    .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
    .dash-grid ul { margin: 5px 0 0 0; padding-left: 20px; font-size: 0.95em; }
    .grand-total { font-size: 1.4em; color: #d35400; text-align: center; margin-top: 15px; border-top: 1px solid #ccc; padding-top: 10px; font-weight: bold; }

    /* --- Controls Section --- */
    .controls { display: flex; flex-wrap: wrap; gap: 15px; background: #f8f9fa; padding: 15px; border-radius: 8px; align-items: flex-start; margin-bottom: 20px; }
    .controls div { display: flex; flex-direction: column; min-width: 160px; }
    .controls label { font-weight: bold; margin-bottom: 5px; font-size: 0.9em; color: #2c3e50; }
    input[type="date"], select { padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-family: inherit; font-size: 1em; background: white; }
    button.fetch-btn { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 1em; align-self: flex-start; margin-top: 22px; }
    button.fetch-btn:hover { background: #219150; transform: translateY(-1px); }

    /* --- Table & Card Styling (Main Data) --- */
    .table-res { overflow-x: auto; margin-top: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); width: 100%; }
    .table-res table { width: 100%; border-collapse: collapse; background: white; min-width: 600px; }
    .table-res th, .table-res td { border: 1px solid #eee; padding: 12px; text-align: left; }
    .table-res th { background: #34495e; color: white; position: sticky; top: 0; z-index: 10; }
    tr:nth-child(even) { background-color: #fcfcfc; }
    
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .card { background: white; border: 1px solid #e0e0e0; border-radius: 10px; padding: 18px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); transition: 0.3s; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.08); }
    
    .empty-state { color: #95a5a6; font-style: italic; padding: 8px 0; }
    .total-line { font-weight: bold; font-size: 1.1em; padding-top: 8px; }

    /* --- Pagination --- */
    .pagination { display: none; justify-content: center; align-items: center; gap: 15px; margin-top: 30px; flex-wrap: wrap; padding: 20px; background: #f8f9fa; border-radius: 8px; }
    .p-btn { padding: 10px 18px; background: #34495e; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    .p-btn:disabled { background: #bdc3c7; cursor: not-allowed; }

    /* --- 📊 Analytics Section --- */
    .chart-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
    .chart-box { background: #fff; border: 1px solid #e0e0e0; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); width: 100%; overflow: hidden; }

    .perc-table { width: 100% !important; min-width: auto !important; margin-top: 15px; font-size: 0.85em; border-collapse: collapse; table-layout: fixed; }
    .perc-table th { background: #f8f9fa; color: #2c3e50; padding: 10px 5px; border-bottom: 2px solid #ddd; text-align: left; }
    .perc-table td { padding: 10px 5px; border-bottom: 1px solid #eee; text-align: left; word-wrap: break-word; overflow-wrap: break-word; white-space: normal; }

    .perc-table th:nth-child(1), .perc-table td:nth-child(1) { width: 45%; }
    .perc-table th:nth-child(2), .perc-table td:nth-child(2) { width: 35%; }
    .perc-table th:nth-child(3), .perc-table td:nth-child(3) { width: 20%; }

    /* --- Mobile Responsive Fixes --- */
    @media (max-width: 600px) {
      .controls { flex-direction: column; align-items: stretch; }
      .controls div { min-width: 100%; }
      button.fetch-btn { margin-top: 10px; width: 100%; }
      .tab-btn { padding: 10px 15px; font-size: 0.95em; }
      .chart-container { grid-template-columns: 1fr; }
      .chart-box { padding: 10px; }
      .perc-table { font-size: 0.8em; }
    }
  </style>
</head>
<body>

<div class="container">
  <h2 style="text-align: center; color: #2c3e50; margin-bottom: 5px;">Revenue, Expense, Analytics</h2>
  <div style="text-align: center; font-weight: bold; color: #7f8c8d; margin-bottom: 20px; font-size: 1.1em;">
    🏨 Viable Inn | 📅 March 2026
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('guests', this)">🛏️ Revenue</button>
    <button class="tab-btn" onclick="switchTab('expenses', this)">💸 Expenses</button>
    <button class="tab-btn" onclick="switchTab('revenue', this)">🔍 Payment Search</button>
    <button class="tab-btn" style="color:#d35400;" onclick="switchTab('analytics', this)">📊 Analytics</button>
  </div>

  <div id="alertBar"></div>

  <div class="controls">
    <div id="dateStartBox">
      <label>From Date:</label>
      <input type="date" id="startDate">
      <div style="font-size: 0.82em; margin-top: 3px; min-height: 1.2em;"></div>
    </div>

    <div id="dateEndBox">
      <label>To Date:</label>
      <input type="date" id="endDate">
      <div style="font-size: 0.82em; margin-top: 3px; min-height: 1.2em;"></div>
    </div>

    <div id="categoryContainer" style="display: none; min-width: 160px; max-width: 190px;">
      <label>Expense Category:</label>
      <select id="expCategory" style="width: 100%;"></select>
      <div id="catHint" style="font-size: 0.82em; margin-top: 3px; font-weight: bold; min-height: 1.2em; line-height: 1.2;"></div>
    </div>
    
    <div id="methodContainer" style="display: none; min-width: 160px; max-width: 190px;">
      <label>Payment Method:</label>
      <select id="payMethod" style="width: 100%;"></select>
      <div id="searchHint" style="font-size: 0.82em; margin-top: 3px; font-weight: bold; min-height: 1.2em; line-height: 1.2;"></div>
    </div>

    <div id="transTypeContainer" style="display: none; min-width: 160px;">
      <label>Transaction Type:</label>
      <select id="transType" style="width: 100%;" onchange="updateTransHint()">
        <option value="All">All</option>
        <option value="Revenue">Revenue</option>
        <option value="Expense">Expense</option>
      </select>
      <div id="transHint" style="font-size: 0.82em; margin-top: 3px; font-weight: bold; min-height: 1.2em; line-height: 1.2;"></div>
    </div>
    
    <div>
      <label style="visibility: hidden;">Fetch</label>
      <button id="fetchBtn" class="fetch-btn" onclick="fetchData()" style="margin-top: 0; padding: 8.5px; width: 100%;">Fetch Data</button>
      <div style="font-size: 0.82em; margin-top: 3px; min-height: 1.2em;"></div>
    </div>

    <div id="viewModeBox" style="min-width: 160px;">
      <label>View Mode:</label>
      <select id="vMode" style="width: 100%;" onchange="renderUI()">
        <option value="table">Table</option>
        <option value="card">Cards</option>
      </select>
      <div class="hint" style="font-size: 0.82em; margin-top: 3px; font-weight: bold; min-height: 1.2em; line-height: 1.2; color: #7f8c8d;">💡 Cards For Mobile.</div>
    </div>
  </div>

  <div id="loader"><img src="https://i.imgur.com/83pL09v.gif" alt="loading" style="width:25px; vertical-align:middle; margin-right:8px;"> Fetching data, please wait...</div>
  <div id="dashboard" class="dashboard"></div>
  <div id="content"></div>

  <div class="pagination" id="pagin">
    <button class="p-btn" id="prevB" onclick="changePage(-1)">Previous</button>
    <span id="pageTxt" style="font-weight: bold; color: #2c3e50;"></span>
    <button class="p-btn" id="nextB" onclick="changePage(1)">Next</button>
    <select id="pageSize" class="page-size-select" onchange="changePageSize()">
      <option value="10">10 / page</option><option value="20">20 / page</option>
      <option value="50">50 / page</option><option value="all">View All</option>
    </select>
  </div>
</div>

<script>
  // ==========================================
  // API CONFIGURATION
  // ==========================================
  const API_URL = "https://script.google.com/macros/s/AKfycbw2z8p7SYQsd76L2vdtPyZR4jecKMJq_trlrPjmA6Hhl751uig2Wms8g8Lse49QyL_y/exec";

  // 🌟 Transaction Type Hint Logic
  function updateTransHint() {
    let val = document.getElementById('transType').value;
    let hint = document.getElementById('transHint');
    if (val === 'All') hint.innerHTML = "";
    else if (val === 'Revenue') hint.innerHTML = "📥 <span style='color:#27ae60;'><b>Only Revenue</b> Shown</span>"; 
    else if (val === 'Expense') hint.innerHTML = "📤 <span style='color:#c0392b;'><b>Only Expense</b> Shown</span>"; 
  }

  let currentTab = 'guests'; let globalData = []; let curPage = 1; let perPage = 10;
  google.charts.load('current', {'packages':['corechart']});

  window.addEventListener('load', function() {
    // Fetch Dropdown Methods
    fetch(API_URL + "?action=getDropdownMethods")
      .then(res => res.json())
      .then(methods => {
        let select = document.getElementById('payMethod'); select.innerHTML = ""; 
        let placeholder = document.createElement('option'); placeholder.value = ""; placeholder.text = "-- Select Method --"; select.appendChild(placeholder);
        let allOpt = document.createElement('option'); allOpt.value = "All Payments"; allOpt.text = "All Payments"; select.appendChild(allOpt);
        methods.forEach(m => { let opt = document.createElement('option'); opt.value = m; opt.text = m; select.appendChild(opt); });
        
        select.addEventListener('change', function() {
          let hint = document.getElementById('searchHint');
          if (this.value === "") hint.innerText = "";
          else if (this.value === "All Payments") hint.innerHTML = "";
          else hint.innerHTML = "🎯 <span style='color:#27ae60;'>Only <b>" + this.value + "</b> Payments.</span>";
        });
      }).catch(err => console.error(err));

    // Fetch Expense Categories
    fetch(API_URL + "?action=getExpenseCategories")
      .then(res => res.json())
      .then(cats => {
        let select = document.getElementById('expCategory'); select.innerHTML = "";
        let allOpt = document.createElement('option'); allOpt.value = "All Categories"; allOpt.text = "All Categories"; select.appendChild(allOpt);
        cats.forEach(c => { let opt = document.createElement('option'); opt.value = c; opt.text = c; select.appendChild(opt); });
        
        select.addEventListener('change', function() {
          let hint = document.getElementById('catHint');
          if (this.value === "All Categories") hint.innerHTML = "📂 <span style='color:#2980b9;'>Showing results for <b>All Categories</b>.</span>";
          else hint.innerHTML = "🎯 <span style='color:#d35400;'>Showing results for <b>" + this.value + "</b> only.</span>";
        });
      }).catch(err => console.error(err));
  });

  function switchTab(tabName, btnElement) {
    currentTab = tabName; 
    document.getElementById('loader').style.display = 'none';
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); 
    btnElement.classList.add('active');
    document.getElementById('content').innerHTML = ''; 
    document.getElementById('dashboard').style.display = 'none'; 
    document.getElementById('pagin').style.display = 'none'; 
    hideAlert(); 
    
    let isAnalytics = (tabName === 'analytics');
    document.getElementById('dateStartBox').style.display = isAnalytics ? 'none' : 'flex';
    document.getElementById('dateEndBox').style.display = isAnalytics ? 'none' : 'flex';
    document.getElementById('fetchBtn').style.display = isAnalytics ? 'none' : '';
    document.getElementById('viewModeBox').style.display = isAnalytics ? 'none' : 'block';

    document.getElementById('methodContainer').style.display = (tabName === 'revenue') ? 'flex' : 'none';
    document.getElementById('transTypeContainer').style.display = (tabName === 'revenue') ? 'flex' : 'none';
    document.getElementById('categoryContainer').style.display = (tabName === 'expenses') ? 'flex' : 'none';

    if (isAnalytics) fetchData();
  }
  
  function showModernAlert(msg) { const bar = document.getElementById('alertBar'); bar.innerText = msg; bar.style.display = 'block'; setTimeout(() => { bar.style.opacity = '1'; }, 10); window.scrollTo({ top: 0, behavior: 'smooth' }); }
  function hideAlert() { const bar = document.getElementById('alertBar'); bar.style.opacity = '0'; setTimeout(() => { if(bar.style.opacity === '0') bar.style.display = 'none'; }, 400); }
  function formatDateStr(htmlDate) { let parts = htmlDate.split('-'); return `${parts[2]}/${parts[1]}/${parts[0]}`; }

  function fetchData() {
    hideAlert(); document.getElementById('content').innerHTML = ''; document.getElementById('dashboard').style.display = 'none'; document.getElementById('pagin').style.display = 'none';
    document.getElementById('loader').style.display = 'block';

    if (currentTab === 'analytics') {
      fetch(API_URL + "?action=getFullAnalyticsData")
        .then(res => res.json())
        .then(data => { if(data.error) throw new Error(data.error); renderAnalytics(data); })
        .catch(handleErr);
      return; 
    }

    let sDate = document.getElementById('startDate').value; 
    let eDate = document.getElementById('endDate').value;
    
    if (!sDate || !eDate) { document.getElementById('loader').style.display = 'none'; showModernAlert("⚠️ Attention: Please select both From and To dates to proceed!"); return; }
    if (new Date(sDate) > new Date(eDate)) { document.getElementById('loader').style.display = 'none'; showModernAlert("🚫 Invalid Range: End Date cannot be before Start Date!"); return; }

    if (currentTab === 'revenue') {
      let sel = document.getElementById('payMethod').value;
      if (!sel || sel === "") { document.getElementById('loader').style.display = 'none'; showModernAlert("⚠️ Please select one option to proceed with the payment search!"); return; }
    }

    let startF = formatDateStr(sDate); let endF = formatDateStr(eDate);
    let url = API_URL;

    if (currentTab === 'guests') {
      url += `?action=getGuestsData&start=${startF}&end=${endF}`;
    } else if (currentTab === 'expenses') {
      let cat = document.getElementById('expCategory').value;
      url += `?action=getExpensesData&start=${startF}&end=${endF}&cat=${encodeURIComponent(cat)}`;
    } else if (currentTab === 'revenue') { 
      let sel = document.getElementById('payMethod').value; 
      let tType = document.getElementById('transType').value;
      url += `?action=getPaymentSearchData&start=${startF}&end=${endF}&method=${encodeURIComponent(sel)}&type=${encodeURIComponent(tType)}`;
    }

    fetch(url)
      .then(res => res.json())
      .then(data => { if(data.error) throw new Error(data.error); onDataSuccess(data); })
      .catch(handleErr);
  }

  function handleErr(err) { showModernAlert("❌ Error: " + err.message); document.getElementById('loader').style.display = 'none'; }

  function onDataSuccess(response) {
    document.getElementById('loader').style.display = 'none';
    if (currentTab === 'guests') globalData = response.guests;
    else if (currentTab === 'expenses') globalData = response.expenses;
    else if (currentTab === 'revenue') globalData = response.records; 

    if (!globalData || globalData.length === 0) { document.getElementById('content').innerHTML = "<h3 style='text-align:center; color:#7f8c8d; margin-top:40px;'>No records found for the selected criteria.</h3>"; return; }
    
    curPage = 1;
    if (currentTab === 'revenue') {
      let tType = document.getElementById('transType').value;
      renderDashboard({ totalReceived: response.totalReceived, totalPaid: response.totalPaid, method: document.getElementById('payMethod').value, tType: tType });
    }
    else renderDashboard(response.dashboard);
    
    document.getElementById('pageSize').value = "10"; perPage = 10; renderUI();
  }

  function filterZeros(dataObj) {
    let filtered = {};
    for (let key in dataObj) {
      if (dataObj[key] > 0) {
        filtered[key] = dataObj[key];
      }
    }
    return filtered;
  }

  // --- ANALYTICS RENDERER ---
  function renderAnalytics(data) {
    document.getElementById('loader').style.display = 'none';
    if (currentTab !== 'analytics') return;
    
    let netBal = data.totalRevenue - data.grandTotalExp;
    let balColor = netBal >= 0 ? '#27ae60' : '#c0392b';

    let html = `
      <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:15px; margin-bottom:20px;">
        <div style="background:#2980b9; color:white; padding:15px; border-radius:10px; text-align:center;">
          <small>Total Revenue</small><br><b style="font-size:1.6em;">₹${data.totalRevenue.toLocaleString('en-IN')}</b>
        </div>
        <div style="background:#e67e22; color:white; padding:15px; border-radius:10px; text-align:center;">
          <small>Total Expenses</small><br><b style="font-size:1.6em;">₹${data.grandTotalExp.toLocaleString('en-IN')}</b>
        </div>
        <div style="background:${balColor}; color:white; padding:15px; border-radius:10px; text-align:center;">
          <small>Net Profit/Loss</small><br><b style="font-size:1.6em;">₹${netBal.toLocaleString('en-IN')}</b>
        </div>
      </div>

      <div class="chart-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px;">
        <div class="chart-box" style="border-top: 5px solid #2ecc71;">
          <h4 style="text-align:center;">📊 Net Income vs Expense</h4>
          <div id="incomeExpChart" style="height: 250px;"></div>
          ${generateAnalyticsTable(data.incomeAnalysis, data.totalRevenue, 'Item')}
        </div>
        <div class="chart-box">
          <h4 style="text-align:center;">🍽️ Revenue Source</h4>
          <div id="foodRoomChart" style="height: 250px;"></div>
          ${generateAnalyticsTable(data.revenueComparison, data.totalRevenue, 'Source')}
        </div>
        <div class="chart-box">
          <h4 style="text-align:center;">💳 Revenue Mode</h4>
          <div id="cashOnlineChart" style="height: 250px;"></div>
          ${generateAnalyticsTable(data.revenueMode, data.totalRevenue, 'Mode')}
        </div>
        <div class="chart-box">
          <h4 style="text-align:center;">🛠️ Expense Categories</h4>
          <div id="expCatChart" style="height: 250px;"></div>
          ${generateAnalyticsTable(data.expenseCategoryWise, data.grandTotalExp, 'Category')}
        </div>
        <div class="chart-box">
          <h4 style="text-align:center;">💰 Expense Mode</h4>
          <div id="expModeChart" style="height: 250px;"></div>
          ${generateAnalyticsTable(data.expenseMode, data.grandTotalExp, 'Mode')}
        </div>
      </div>
    `;
    
    document.getElementById('content').innerHTML = html;

    drawDonut(data.revenueComparison, 'foodRoomChart');
    drawDonut(data.revenueMode, 'cashOnlineChart');
    drawDonut(data.incomeAnalysis, 'incomeExpChart', ['#e74c3c', '#2ecc71']); 
    drawDonut(data.expenseCategoryWise, 'expCatChart');
    drawDonut(data.expenseMode, 'expModeChart');
  }

  function drawDonut(dataObj, elementId, customColors) {
    let filteredObj = filterZeros(dataObj);
    if(Object.keys(filteredObj).length === 0) {
       document.getElementById(elementId).innerHTML = "<p style='text-align:center; color:#95a5a6; margin-top:100px;'>No Data Yet</p>";
       return;
    }
    let dataArr = [['Task', 'Value'], ...Object.entries(filteredObj)];
    let data = google.visualization.arrayToDataTable(dataArr);
    let options = { 
      pieHole: 0.4, 
      chartArea: {width:'90%', height:'75%'}, 
      legend: { position: 'bottom', textStyle: {fontSize: 13, bold: true} },
      pieSliceText: 'none',
      tooltip: { trigger: 'focus', showColorCode: true }
    };
    if(customColors) options.colors = customColors;
    new google.visualization.PieChart(document.getElementById(elementId)).draw(data, options);
  }

  function generateAnalyticsTable(dataObj, total, label = "Item") {
    let filteredObj = filterZeros(dataObj);
    let sortedEntries = Object.entries(filteredObj).sort((a, b) => b[1] - a[1]);
    let html = `<div style="overflow-x: auto;">
                  <table class="perc-table">
                    <tr style="background:#f8f9fa;">
                      <th>${label}</th><th>Amount</th><th>%</th>
                    </tr>`;
    let hasData = false;
    sortedEntries.forEach(([k, v]) => {
      hasData = true;
      let perc = total > 0 ? ((v / total) * 100).toFixed(1) : 0;
      html += `<tr><td><b>${k}</b></td><td>₹${v.toLocaleString('en-IN')}</td><td style="color:#2980b9;"><b>${perc}%</b></td></tr>`;
    });
    if(!hasData) html += `<tr><td colspan="3" style="text-align:center; color:#95a5a6;">No Data Yet</td></tr>`;
    html += `<tr style="background:#f1f7ff; border-top:2px solid #ddd;"><td colspan="2"><b>Grand Total</b></td><td><b>₹${total.toLocaleString('en-IN')}</b></td></tr></table></div>`;
    return html;
  }
  
  // --- DASHBOARD RENDERER ---
  function renderDashboard(d) {
    let dash = document.getElementById('dashboard'); 
    dash.style.display = 'block'; 
    let html = `<h3>📊 Range Summary</h3>`;
    
    if (currentTab === 'guests') {
      let combinedMethods = {};
      if (d.foodMethods) Object.entries(d.foodMethods).forEach(([m, a]) => combinedMethods[m] = (combinedMethods[m] || 0) + a);
      if (d.roomMethods) Object.entries(d.roomMethods).forEach(([m, a]) => combinedMethods[m] = (combinedMethods[m] || 0) + a);
      
      html += `<div class="dash-grid">
                <div style="background:#fff; padding:15px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.05);">
                  <div style="margin-bottom:10px; font-size:1.15em; color:#2c3e50;"><b>🍴 Total Food:</b> <span style="color:#27ae60; float:right;">₹${d.totalFood}</span></div>
                  <div style="font-size:1.15em; color:#2c3e50;"><b>🛏️ Total Room:</b> <span style="color:#27ae60; float:right;">₹${d.totalRoom}</span></div>
                  <div style="margin-top:15px; border-top:2px dashed #bdc3c7; padding-top:10px; font-size:1.2em; color:#d35400; text-align:right;"><b>Total: ₹${d.grandTotal}</b></div>
                </div>
                <div style="background:#fff; padding:15px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.05);">
                  <b style="color:#2c3e50; font-size:1.1em;">💳 Method-wise Total:</b>
                  <ul style="list-style-type: none; padding-left: 0; margin-top: 10px; margin-bottom: 15px;">
                    ${Object.entries(combinedMethods).map(([m, a]) => `<li style="margin-bottom:8px; padding-left:10px; border-left:3px solid #3498db; font-size:1.1em; color:#34495e;">${m}: <b style="float:right;">₹${a}</b></li>`).join('')}
                  </ul>
                  <div style="margin-top:auto; border-top:2px dashed #bdc3c7; padding-top:10px; font-size:1.2em; color:#d35400; text-align:right;"><b>Total: ₹${d.grandTotal}</b></div>
                </div>
               </div>
               <div class="grand-total" style="background:#2c3e50; color:#fff; padding:15px; border-radius:8px; margin-top:20px; font-size:1.5em; box-shadow:0 4px 6px rgba(0,0,0,0.1);">✅ Total Revenue: ₹${d.grandTotal}</div>`;
               
    } else if (currentTab === 'expenses') {
      let methTotal = Object.values(d.byMethod).reduce((sum, val) => sum + val, 0);
      
      if (!d.filteredCategory || d.filteredCategory === "All") {
        let catTotal = Object.values(d.byCategory).reduce((sum, val) => sum + val, 0);
        html += `<div class="dash-grid">
                  <div style="background:#fff; padding:15px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.05);">
                    <b style="color:#2c3e50; font-size:1.1em;">📂 Expenses by Category:</b>
                    <ul style="list-style-type: none; padding-left: 0; margin-top: 10px;">
                      ${Object.entries(d.byCategory).map(([c,a]) => `<li style="margin-bottom:8px; padding-left:10px; border-left:3px solid #e67e22; font-size:1.05em; color:#34495e;">${c}: <b style="float:right;">₹${a}</b></li>`).join('')}
                    </ul>
                    <div style="margin-top:10px; border-top:2px dashed #bdc3c7; padding-top:10px; font-size:1.1em; color:#d35400; text-align:right;"><b>Category Total: ₹${catTotal}</b></div>
                  </div>
                  <div style="background:#fff; padding:15px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.05);">
                    <b style="color:#2c3e50; font-size:1.1em;">💳 Expenses by Method:</b>
                    <ul style="list-style-type: none; padding-left: 0; margin-top: 10px;">
                      ${Object.entries(d.byMethod).map(([m,a]) => `<li style="margin-bottom:8px; padding-left:10px; border-left:3px solid #3498db; font-size:1.05em; color:#34495e;">${m}: <b style="float:right;">₹${a}</b></li>`).join('')}
                    </ul>
                    <div style="margin-top:10px; border-top:2px dashed #bdc3c7; padding-top:10px; font-size:1.1em; color:#d35400; text-align:right;"><b>Method Total: ₹${methTotal}</b></div>
                  </div>
                 </div>
                 <div class="grand-total" style="background:#c0392b; color:#fff; padding:15px; border-radius:8px; margin-top:20px; font-size:1.5em; box-shadow:0 4px 6px rgba(0,0,0,0.1);">📉 Grand Total Expense: ₹${d.grandTotal}</div>`;
      
      } else {
        html += `<div class="dash-grid">
                  <div style="background:#fff; padding:20px; border-radius:8px; border-left: 6px solid #d35400; box-shadow:0 2px 5px rgba(0,0,0,0.05); display:flex; flex-direction:column; justify-content:center;">
                    <div style="font-size:1.1em; color:#7f8c8d; margin-bottom:5px;">Category Selected:</div>
                    <b style="font-size:1.4em; color:#d35400;">📂 ${d.filteredCategory}</b>
                    <div style="font-size:1.6em; color:#2c3e50; font-weight:bold; margin-top:15px; border-top:1px solid #eee; padding-top:10px;">Total: ₹${d.grandTotal}</div>
                  </div>
                  <div style="background:#fff; padding:15px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.05);">
                    <b style="color:#2c3e50; font-size:1.1em;">💳 Payment Methods Used:</b>
                    <ul style="list-style-type: none; padding-left: 0; margin-top: 10px; margin-bottom: 15px;">
                      ${Object.entries(d.byMethod).map(([m,a]) => `<li style="margin-bottom:8px; padding-left:10px; border-left:3px solid #3498db; font-size:1.1em; color:#34495e;">${m}: <b style="float:right;">₹${a}</b></li>`).join('')}
                    </ul>
                    <div style="margin-top:auto; border-top:2px dashed #bdc3c7; padding-top:10px; font-size:1.1em; color:#d35400; text-align:right;"><b>Method Total: ₹${methTotal}</b></div>
                  </div>
                 </div>`;
      }
      
    } else if (currentTab === 'revenue') {
      html += `<div class="dash-grid">`;
      if (d.tType === "All" || d.tType === "Revenue") {
        html += `<div style="background:#ebf5fb; padding:20px; border-radius:8px; text-align:center; box-shadow:0 2px 5px rgba(0,0,0,0.05);">
                  <b style="color:#2c3e50; font-size:1.1em;">💰 Total Received via ${d.method.toUpperCase()}</b>
                  <div style="font-size:1.8em; color:#27ae60; font-weight:bold; margin-top:10px;">₹${d.totalReceived}</div>
                 </div>`;
      }
      if (d.tType === "All" || d.tType === "Expense") {
        html += `<div style="background:#fef5f5; padding:20px; border-radius:8px; text-align:center; box-shadow:0 2px 5px rgba(0,0,0,0.05);">
                  <b style="color:#2c3e50; font-size:1.1em;">💸 Total Paid via ${d.method.toUpperCase()}</b>
                  <div style="font-size:1.8em; color:#e74c3c; font-weight:bold; margin-top:10px;">₹${d.totalPaid}</div>
                 </div>`;
      }
      html += `</div>`;
    }
    dash.innerHTML = html;
  }

  function changePageSize() { let sizeVal = document.getElementById('pageSize').value; perPage = (sizeVal === 'all') ? (globalData.length || 1) : parseInt(sizeVal); curPage = 1; renderUI(); }

  function renderUI() {
    if (!globalData || globalData.length === 0) { document.getElementById('pagin').style.display = 'none'; return; }
    let mode = document.getElementById('vMode').value; 
    let pag = document.getElementById('pagin');
    pag.style.display = 'flex'; 
    let sizeVal = document.getElementById('pageSize').value; 
    let totalPages = Math.ceil(globalData.length / perPage) || 1;
    let prevBtn = document.getElementById('prevB'); let nextBtn = document.getElementById('nextB'); let pageText = document.getElementById('pageTxt');

    if (sizeVal === 'all') { 
      pageText.innerText = `Showing All ${globalData.length} records`; 
      prevBtn.style.display = 'none'; nextBtn.style.display = 'none'; 
    } else { 
      pageText.innerText = `Page ${curPage} of ${totalPages}`; 
      prevBtn.style.display = 'inline-block'; nextBtn.style.display = 'inline-block'; 
      prevBtn.disabled = curPage === 1; nextBtn.disabled = curPage === totalPages; 
    }

    let startIdx = (curPage - 1) * perPage; 
    let pageData = globalData.slice(startIdx, startIdx + perPage);
    document.getElementById('content').innerHTML = (mode === 'table') ? generateTable(pageData) : generateCards(pageData);
  }

  function generateTable(data) {
    let html = ``;
    if (currentTab === 'guests') {
      html += `<div class="table-res"><table><tr><th>Date</th><th>Guest Name</th><th>Food Breakdown</th><th>Total Food</th><th>Room Breakdown</th><th>Total Room</th><th>Grand Total</th></tr>`;
      data.forEach(item => { let fStr = item.foodBreakdown.map(b => `${b.method}: ${b.text}`).join('<br>'); let rStr = item.roomBreakdown.map(b => `${b.method}: ${b.text}`).join('<br>'); html += `<tr><td>${item.date}</td><td><b>${item.name}</b></td><td>${fStr}</td><td style="color:#27ae60; font-weight:bold;">${item.totalFood ? '₹'+item.totalFood : ''}</td><td>${rStr}</td><td style="color:#27ae60; font-weight:bold;">${item.totalRoom ? '₹'+item.totalRoom : ''}</td><td><b>${item.grandTotal ? '₹'+item.grandTotal : ''}</b></td></tr>`; });
      html += `</table></div>`;
    } else if (currentTab === 'expenses') {
      html += `<div class="table-res"><table><tr><th>Date</th><th>Expense Details</th><th>Daily Total</th></tr>`;
      data.forEach(item => { let details = item.sets.map(s => `• ${s.item} (${s.type}) | ${s.method}: <b>₹${s.amt}</b>`).join('<br>'); html += `<tr><td style="white-space:nowrap;">${item.date}</td><td>${details}</td><td style="color:#d35400; font-weight:bold;">${item.dayTotal ? '₹'+item.dayTotal : ''}</td></tr>`; });
      html += `</table></div>`;
    } else if (currentTab === 'revenue') {
      let selMethod = document.getElementById('payMethod').value;
      let tType = document.getElementById('transType').value;
      let tableHead = `<tr><th style="width:105px;">Date</th>`;
      if (tType === "All" || tType === "Revenue") tableHead += `<th>📥 Income Details (${selMethod})</th>`;
      if (tType === "All" || tType === "Expense") tableHead += `<th>📤 Expense Details (${selMethod})</th>`;
      tableHead += `</tr>`;
      html += `<div class="table-res"><table>${tableHead}`;
      data.forEach(item => {
        let rowHtml = `<tr><td style="white-space:nowrap; vertical-align:top;"><b>${item.displayDate}</b></td>`;
        if (tType === "All" || tType === "Revenue") {
          let incHtml = item.incomes.map(inc => `<div style="margin-bottom:6px;"><b>${inc.name}</b><br><span style="color:#555; font-size:0.9em;">Food: ${inc.foodStr} | Room: ${inc.roomStr}</span><br><b style="color:#27ae60; font-size:1.1em;">₹${inc.total}</b></div>`).join('<hr style="margin:6px 0; border:0; border-top:1px dashed #ccc;">');
          if (!incHtml) incHtml = `<span style="color:#999; font-style:italic;">No Income</span>`;
          rowHtml += `<td style="vertical-align:top; border-right: 1px solid #eee;">${incHtml}</td>`;
        }
        if (tType === "All" || tType === "Expense") {
          let expHtml = item.expenses.length > 0 ? `<div style="padding-top:2px;">${item.expenses.join('')}</div>` : `<span style="color:#999; font-style:italic;">No Expenses</span>`;
          rowHtml += `<td style="vertical-align:top;">${expHtml}</td>`;
        }
        rowHtml += `</tr>`;
        html += rowHtml;
      });
      html += `</table></div>`;
    }
    return html;
  }

  function generateCards(data) {
    let html = `<div class="card-grid">`;
    data.forEach(item => {
      html += `<div class="card">`;
      if (currentTab === 'guests') {
        html += `<h4>${item.date}</h4><div style="font-size:1.1em; margin-bottom:10px; color:#2980b9;"><b>${item.name}</b></div>`;
        if (item.totalFood > 0) html += `<b>🍴 Food:</b> <span style="font-size:0.9em;">${item.foodBreakdown.map(b => `${b.method}: ${b.text}`).join(' | ')}</span><br>`;
        if (item.totalRoom > 0) html += `<b>🛏️ Room:</b> <span style="font-size:0.9em;">${item.roomBreakdown.map(b => `${b.method}: ${b.text}`).join(' | ')}</span><br>`;
        if (item.grandTotal > 0) html += `<hr><div class="total-line">Grand Total: ₹${item.grandTotal}</div>`;
        else html += `<div class="empty-state">No billing data.</div>`;
      } else if (currentTab === 'expenses') {
        html += `<h4>${item.date}</h4>`;
        if (item.sets && item.sets.length > 0) { 
          html += `<ul style="margin:0; padding-left:15px; font-size:0.95em;">`; 
          item.sets.forEach(s => { html += `<li style="margin-bottom:5px;">${s.item} (${s.type})<br><span style="color:#7f8c8d;">${s.method}:</span> <b>₹${s.amt}</b></li>`; }); 
          html += `</ul><hr><div class="total-line" style="color:#d35400;">Daily Total: ₹${item.dayTotal}</div>`; 
        } else { html += `<div class="empty-state">No records.</div>`; } 
      } else if (currentTab === 'revenue') {
        let tType = document.getElementById('transType').value;
        html += `<h4 style="background:#2c3e50; color:white; padding:8px; margin:-15px -15px 15px -15px; border-radius:8px 8px 0 0;">🗓️ ${item.displayDate}</h4>`;
        if (tType === "All" || tType === "Revenue") {
          if (item.incomes && item.incomes.length > 0) {
            item.incomes.forEach(inc => { html += `<div style="margin-bottom:8px;"><b style="color:#2980b9;">👤 ${inc.name}</b><br><span style="font-size:0.9em; color:#555;">Food: ${inc.foodStr} | Room: ${inc.roomStr}</span><br><b style="color:#27ae60; font-size:1.1em;">₹${inc.total}</b></div><hr style="margin:8px 0; border:0; border-top:1px dashed #ccc;">`; });
          } else { html += `<div class="empty-state">No Income</div>`; }
        }
        if (tType === "All") { html += `<div style="margin: 20px 0 15px 0; border-top: 3px solid #bdc3c7; position:relative; text-align:center;"><span style="background:white; padding:0 10px; position:relative; top:-12px; color:#7f8c8d; font-size:0.85em; font-weight:bold;">EXPENSES</span></div>`; }
        if (tType === "All" || tType === "Expense") {
          if (tType === "Expense") html += `<div style="margin-bottom:10px; font-weight:bold; color:#c0392b;">📤 Expenses</div>`;
          if (item.expenses && item.expenses.length > 0) { html += `<div style="padding-top:2px;">${item.expenses.join('')}</div>`; }
          else { html += `<div class="empty-state">No Expenses</div>`; }
        }
      }
      html += `</div>`;
    });
    html += `</div>`; 
    return html;
  }

  function changePage(dir) { curPage += dir; renderUI(); window.scrollTo(0, document.getElementById('dashboard').offsetTop - 20); }
</script>
</body>
</html>
